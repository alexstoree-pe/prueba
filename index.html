<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promos Mayoristas | Alex Store</title>
    
    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --vip: #d4af37; 
            --dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --whatsapp: #25d366;
            --text-gray: #bbb;
            --timer-color: #00d4ff; 
            --danger-bright: #ff3333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top right, #1a1a1a, #050505);
            color: white;
            padding-bottom: 120px;
        }

        header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 2px solid var(--vip);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        header h1 { font-size: 1.6rem; color: var(--vip); }

        /* BUSCADOR */
        .search-container {
            max-width: 400px;
            margin: 15px auto 0;
            position: relative;
        }
        .search-container input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: white;
        }
        .search-container i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--vip);
        }

        .container { padding: 20px 15px; max-width: 600px; margin: auto; }

        .category-title {
            margin: 30px 0 15px;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--vip);
        }

        .promo-link {
            display: block;
            margin-bottom: 20px;
        }

        .vip-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 22px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .service-logo {
            width: 70px;
            height: 70px;
            border-radius: 15px;
        }

        .service-text { flex-grow: 1; }

        .price-tag {
            font-weight: 800;
            font-size: 1.3rem;
        }

        .floating-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--vip);
            color: #000;
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 800;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
    </style>
</head>

<body>

<header>
    <h1>ALEX STORE PROMOS 👑</h1>
    <p>Panel Exclusivo para Mayoristas</p>

    <!-- BUSCADOR -->
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="buscador" placeholder="Buscar promo...">
    </div>
</header>

<div class="container">

    <div class="category-title">📦 PACKS</div>

    <!-- EJEMPLO -->
    <a href="#" class="promo-link" data-aos="fade-up">
        <div class="vip-card">
            <img src="../img/max.png" class="service-logo">
            <div class="service-text">
                <h3 class="nombre-prod">MAX PLATINO COMPLETA</h3>
                <span>10 cuentas</span>
            </div>
            <div class="price-tag">S/ 50</div>
        </div>
    </a>

    <a href="#" class="promo-link" data-aos="fade-up">
        <div class="vip-card">
            <img src="../img/vix.png" class="service-logo">
            <div class="service-text">
                <h3 class="nombre-prod">VIX PREMIUM</h3>
                <span>10 cuentas</span>
            </div>
            <div class="price-tag">S/ 30</div>
        </div>
    </a>

</div>

<a href="#" class="floating-btn">PEDIR POR WHATSAPP</a>

<!-- AOS SCRIPT -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
    // INICIAR AOS (FIX SCROLL)
    AOS.init({
        duration: 800,
        once: true,
        offset: 0 // 🔥 clave para que detecte todo
    });

    // FORZAR REFRESH (SOLUCION BUG)
    window.addEventListener('load', () => {
        setTimeout(() => {
            AOS.refreshHard();
        }, 300);
    });

    window.addEventListener('scroll', () => {
        AOS.refresh();
    });

    // BUSCADOR FIX
    document.getElementById('buscador').addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase();

        document.querySelectorAll('.promo-link').forEach(item => {
            const nombre = item.querySelector('.nombre-prod').innerText.toLowerCase();
            item.style.display = nombre.includes(term) ? 'block' : 'none';
        });

        // 🔥 CLAVE: refrescar AOS después de buscar
        setTimeout(() => {
            AOS.refreshHard();
        }, 100);
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Ciberseguridad | Privado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="glass-container">
    <header>
        <div class="status-dot"></div>
        <h1>Base de Datos de Incidencias</h1>
        <p>Sistema de monitoreo de fraude y cuentas fraudulentas</p>
    </header>

    <section class="form-card">
        <h3>Añadir Reporte</h3>
        <div class="input-grid">
            <input type="text" id="phoneInput" placeholder="Número de celular">
            <input type="text" id="typeInput" placeholder="Tipo (ej: Robo de cuenta)">
            <input type="date" id="dateInput">
            <button onclick="checkAccessAndAdd()" class="btn-main">Publicar Reporte</button>
        </div>
    </section>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Filtrar por número registrado...">
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Estado</th>
                    <th>Número</th>
                    <th>Incidencia</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    const ACCESS_CODE = "1234"; // Cambia este código por el que tú quieras
    let reports = [];

    function formatPhoneNumber(num) {
        let clean = num.replace(/\D/g, '');
        return clean.replace(/(\d{3})(\d{3})(\d{3})/, '$1 $2 $3');
    }

    function renderTable(data = reports) {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';

        data.forEach(item => {
            // Lógica de color: si contiene "robo", aplicamos clase 'danger'
            const isRobo = item.type.toLowerCase().includes('robo');
            const rowClass = isRobo ? 'row-danger' : '';

            const row = `
                <tr class="${rowClass}">
                    <td><span class="dot ${isRobo ? 'dot-red' : 'dot-blue'}"></span></td>
                    <td class="num-text">${formatPhoneNumber(item.phone)}</td>
                    <td><span class="type-badge">${item.type}</span></td>
                    <td class="date-text">${item.date}</td>
                </tr>`;
            tableBody.insertAdjacentHTML('afterbegin', row);
        });
    }

    function checkAccessAndAdd() {
        const pass = prompt("Introduzca el código de autorización para reportar:");
        
        if (pass === ACCESS_CODE) {
            const phone = document.getElementById('phoneInput').value;
            const type = document.getElementById('typeInput').value;
            const date = document.getElementById('dateInput').value;

            if(!phone || !type || !date) return alert("Completa todos los campos");

            reports.push({ phone, type, date });
            renderTable();
            
            // Limpiar campos
            document.getElementById('phoneInput').value = '';
            document.getElementById('typeInput').value = '';
        } else {
            alert("Código incorrecto. Acceso denegado.");
        }
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.replace(/\D/g, '');
        const filtered = reports.filter(r => r.phone.replace(/\D/g, '').includes(term));
        renderTable(filtered);
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribución | Alex Store</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        /* BLOQUEO DE SEGURIDAD */
        html { display: none; background-color: #0a0a0a; scroll-behavior: smooth; }
    </style>

    <script>
        (function() {
            const acceso = sessionStorage.getItem("acceso_distribuidor");
            if (acceso === "true") {
                document.documentElement.style.display = "block";
            } else {
                document.addEventListener("DOMContentLoaded", function() {
                    document.documentElement.style.display = "block";
                    document.querySelector('.container').style.display = 'none';
                    document.querySelector('header').style.display = 'none';
                    document.getElementById('modal-login-distribuidor').style.display = 'flex';
                });
            }
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00d4ff; --dark: #050505; --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08); --whatsapp: #25d366;
            --danger-bright: #ff3333; --warning: #f4d03f; --success: #2ecc71;
            --vip: #d4af37; --text-gray: #bbb;
        }

        @keyframes shine-red { 0%, 100% { border-color: var(--danger-bright); box-shadow: 0 0 10px var(--danger-bright); color: #fff; } 50% { border-color: #fff; box-shadow: 0 0 20px var(--danger-bright); } }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle at top right, #1a1a1a, #050505); color: white; padding-bottom: 220px; overflow-x: hidden; }

        /* HEADER PREMIUM */
        header { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); padding: 50px 20px 30px; text-align: center; border-bottom: 1px solid var(--glass-border); margin-bottom: 30px; }
        header h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .update-tag { font-size: 0.75rem; color: var(--success); font-weight: 600; margin-top: 10px; }

        /* TARJETAS PREMIUM */
        .container { padding: 10px 20px; max-width: 650px; margin: auto; }
        .service-link { position: relative; margin-bottom: 20px; cursor: pointer; transition: 0.3s; }
        .service-card { background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 25px; padding: 20px; display: flex; align-items: center; border: 1px solid var(--glass-border); gap: 15px; position: relative; }
        
        /* PREMIUM STYLE */
        .premium .service-card { border: 1px solid var(--vip); box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }
        .premium::after { content: 'PREMIUM'; position: absolute; top: -10px; right: 20px; font-size: 0.6rem; background: var(--vip); color: #000; padding: 2px 8px; border-radius: 4px; font-weight: 900; }

        /* BADGE OFERTA MANUAL */
        .badge-oferta { position: absolute; top: -10px; left: 15px; background: var(--danger-bright); color: white; font-size: 0.6rem; font-weight: 900; padding: 3px 10px; border-radius: 5px; z-index: 10; }

        .service-logo { width: 65px; height: 65px; border-radius: 18px; object-fit: cover; }
        .nombre-prod { font-size: 1.1rem; font-weight: 700; }
        .manual-desc { font-size: 0.75rem; color: var(--text-gray); }
        .price-tag { color: var(--primary); font-weight: 800; font-size: 1.2rem; }
        
        /* SIN STOCK NEON */
        .service-link.agotado .price-container::after { content: "SIN STOCK"; font-size: 0.8rem; font-weight: 900; border: 2px solid var(--danger-bright); padding: 8px 12px; border-radius: 10px; animation: shine-red 1.2s infinite; display: block; }
        .service-link.agotado .price-tag, .service-link.agotado .service-logo { opacity: 0.3; }

        /* CARRITO AVANZADO */
        .floating-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 450px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .floating-btn { background: var(--whatsapp); color: white; padding: 18px; border-radius: 20px; font-weight: 800; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; }
        .btn-trash { background: #ff3333; width: 55px; border-radius: 15px; display: none; }
        
        .modal-pass { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 40px; border-radius: 40px; border: 1px solid var(--primary); text-align: center; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

<header>
    <h1>SOLO DISTRIBUIDORES 🚀</h1>
    <p id="fecha-actualizacion" class="update-tag"></p>
</header>

<div class="container">
    <div class="service-link premium" onclick="this.classList.toggle('selected')">
        <span class="badge-oferta">OFERTA</span>
        <div class="service-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Netflix-new-icon.png" class="service-logo">
            <div class="service-text">
                <h3 class="nombre-prod">Netflix Perfil</h3>
                <span class="manual-desc">Ultra HD 4K • Renovable</span>
            </div>
            <div class="price-container">
                <span class="price-tag precio-prod">S/ 12</span>
            </div>
        </div>
    </div>

    <div class="service-link agotado">
        <div class="service-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Netflix-new-icon.png" class="service-logo">
            <div class="service-text">
                <h3 class="nombre-prod">Amazon Prime</h3>
                <span class="manual-desc">Cuenta completa</span>
            </div>
            <div class="price-container">
                <span class="price-tag precio-prod">S/ 15</span>
            </div>
        </div>
    </div>
</div>

<div class="floating-container">
    <div style="display: flex; gap: 10px;">
        <button onclick="enviarPedido()" class="floating-btn" style="flex-grow: 1;">
            PEDIR (<span id="count-total">0</span>)
        </button>
        <button onclick="limpiarTodo()" id="btn-trash" class="btn-trash"><i class="fa-solid fa-trash-can"></i></button>
    </div>
</div>

<script>
    function actualizarContadores() {
        const num = document.querySelectorAll('.service-link.selected').length;
        document.getElementById('count-total').innerText = num;
        document.getElementById('btn-trash').style.display = num > 0 ? 'flex' : 'none';
    }

    function limpiarTodo() {
        document.querySelectorAll('.service-link.selected').forEach(el => el.classList.remove('selected'));
        actualizarContadores();
    }

    function enviarPedido() {
        const seleccionados = document.querySelectorAll('.service-link.selected');
        if (seleccionados.length === 0) return;
        let lista = "Pedido:\n";
        seleccionados.forEach(p => {
            lista += "• " + p.querySelector('.nombre-prod').innerText + "\n";
        });
        window.open(`https://wa.me/51918600000?text=${encodeURIComponent(lista)}`, '_blank');
    }

    window.onload = () => {
        document.getElementById('fecha-actualizacion').innerText = "✅ Lista: " + new Date().toLocaleDateString();
    };
</script>

<div id="modal-login-distribuidor" class="modal-pass">
    <div class="modal-content">
        <h2 style="color:var(--primary)">ACCESO PRIVADO</h2>
        <input type="password" id="input-dist-pass" style="width:100%; padding:20px; margin:20px 0; border-radius:15px; border:none; text-align:center;">
        <button onclick="validarAcceso()" style="width:100%; padding:15px; border-radius:15px; border:none; background:var(--primary); font-weight:800;">ENTRAR</button>
    </div>
</div>
<script>
    function validarAcceso() {
        if (document.getElementById('input-dist-pass').value === "dis") {
            sessionStorage.setItem("acceso_distribuidor", "true"); location.reload();
        } else { alert("Error"); }
    }
</script>
</body>
</html>

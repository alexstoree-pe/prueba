<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Premium | Alex Store</title>
    <link rel="icon" type="image/png" href="https://alexstoree-pe.github.io/tienda-alex/catalogo/img/logo.webp">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* Aquí van todos tus estilos CSS originales que enviaste en la Parte 1 */
        :root { --primary: #00d4ff; --secondary: #0055ff; --dark: #050505; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08); --whatsapp: #25d366; --promo: #f4d03f; --promo-dark: #d4af37; --danger: #ff4444; --gold-gradient: linear-gradient(45deg, #d4af37, #f4d03f); }
        html { display: none; background-color: var(--dark); scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle at top right, #0a0a0a, #050505); color: white; line-height: 1.6; padding-bottom: 100px; }
        header { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(20px); padding: 15px 15px 10px; text-align: center; border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 2000; }
        .brand-logo { width: 50px; height: 50px; object-fit: contain; border-radius: 18px; margin-bottom: 5px; }
        header h1 { font-size: 1.4rem; font-weight: 800; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }
        .trust-bar { display: flex; justify-content: space-around; margin-top: 10px; padding: 5px; background: var(--glass); border-radius: 15px; border: 1px solid var(--glass-border); }
        .trust-item { display: flex; flex-direction: column; align-items: center; font-size: 0.40rem; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .trust-item i { color: var(--primary); font-size: 1rem; margin-bottom: 4px; }
        .search-container { max-width: 600px; margin: 10px auto 0; position: relative; }
        #search-input { width: 100%; padding: 8px 15px; border-radius: 15px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: white; font-family: 'Poppins'; outline: none; transition: 0.3s; }
        .container { padding: 20px 15px; max-width: 600px; margin: auto; }
        .grid-botones { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0 30px; }
        .btn-universal { display: flex; align-items: center; justify-content: center; padding: 15px 10px; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; border: none; cursor: pointer; text-align: center; }
        .btn-inicio-top { background: var(--glass); color: #fff; border: 1px solid var(--glass-border); }
        .btn-referencias { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: #000; }
        .btn-combos-premium { background: linear-gradient(45deg, var(--promo-dark), var(--promo)); color: #000; }
        .btn-comunidad { background: linear-gradient(45deg, #25d366, #128c7e); color: #fff; }
        .category-title { margin: 15px 0 10px; font-size: 0.9rem; font-weight: 700; color: var(--primary); letter-spacing: 3px; }
        .service-item { cursor: pointer; margin-bottom: 15px; position: relative; transition: 0.3s; }
        .service-card { background: var(--glass); border-radius: 22px; padding: 18px; display: flex; align-items: center; border: 1px solid var(--glass-border); transition: 0.3s; gap: 15px; position: relative; overflow: hidden; }
        .service-item:hover .service-card { border-color: var(--primary) !important; transform: translateY(-3px); }
        .service-item.premium .service-card { border: 1px solid #d4af37 !important; }
        .service-item.premium::after { content: 'PREMIUM'; position: absolute; top: 10px; right: 15px; font-size: 0.5rem; font-weight: 900; color: #d4af37; border: 1px solid #d4af37; padding: 1px 5px; border-radius: 4px; }
        .check-icon { position: absolute; top: 10px; right: 10px; background: var(--primary); color: #000; width: 22px; height: 22px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; z-index: 10; }
        .selected .check-icon { display: flex; }
        .badge-oferta { position: absolute; top: 0; left: 20px; background: var(--promo); color: #000; padding: 2px 12px; border-radius: 0 0 10px 10px; font-size: 0.6rem; font-weight: 800; z-index: 11; }
        .service-logo { width: 60px; height: 60px; object-fit: cover; border-radius: 15px; }
        .price-tag { color: var(--primary); font-weight: 700; font-size: 1.25rem; }
        .btn-consultar-neon { display: none; color: #ff3333; font-size: 0.85rem; font-weight: 900; border: 2px solid var(--danger); padding: 8px 10px; border-radius: 10px; background: rgba(255, 0, 0, 0.1); }
        .service-item.agotado .btn-consultar-neon { display: block; }
        .service-item.agotado .price-tag { display: none; }
        .floating-btn { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #25d366, #128c7e); color: white; padding: 20px; border-radius: 25px; width: 92%; max-width: 480px; z-index: 1000; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .hidden { display: none; }
        .modal-overlay, .modal-pass { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; justify-content: center; align-items: flex-end; z-index: 3000; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .modal-content { background: #111; padding: 35px 25px; border-radius: 35px 35px 0 0; width: 100%; max-width: 500px; border: 1px solid var(--glass-border); text-align: center; }
        #input-pass { width: 100%; padding: 15px; margin: 20px 0; border-radius: 15px; background: #000; border: 1px solid #333; color: var(--primary); text-align: center; font-size: 1.5rem; letter-spacing: 5px; }
        .filter-wrapper { margin: 10px 0; position: relative; display: flex; align-items: center; }
        .filter-container { display: flex; gap: 10px; overflow-x: auto; padding: 10px 5px; scrollbar-width: none; }
        .filter-container::-webkit-scrollbar { display: none; }
        .btn-nav { background: var(--glass); border: 1px solid var(--glass-border); color: white; padding: 8px 20px; border-radius: 50px; font-size: 0.75rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .btn-nav.active { background: var(--primary); color: #000; border-color: var(--primary); }
        /* Color dorado para el precio SOLO en tarjetas premium */
.service-item.premium .precio-prod { color: #f4d03f !important; /* Dorado */ text-shadow: 0 0 10px rgba(244, 208, 63, 0.3); }
/* Estilo para la etiqueta PREMIUM (evita duplicados) */
.premium-tag { font-size: 0.55rem;border: 1px solid #d4af37; color: #d4af37; padding: 2px 5px; border-radius: 4px;font-weight: 900;  display: inline-block; margin-bottom: 5px; letter-spacing: 1px; }
/* Ajuste del precio general */
.precio-prod { font-size: 1.5rem;  font-weight: 800;  display: block; transition: 0.3s; }
    </style>
</head>
<body>

<header>
    <img src="../img/logo.webp" alt="Logo Alex Store" class="brand-logo" data-aos="zoom-in">
    <h1 data-aos="fade-down">ALEX STORE</h1>
    <p style="color: #555; font-size: 0.7rem; letter-spacing: 5px; font-weight: 700; margin-top: 5px;">PREMIUM DIGITAL CATALOG</p>
    
    <div class="search-container" data-aos="fade-up">
        <div class="trust-bar">
            <div class="trust-item"><i class="fas fa-headset"></i>Soporte</div>
            <div class="trust-item"><i class="fas fa-shield-alt"></i>Garantía</div>
            <div class="trust-item"><i class="fas fa-bolt"></i>Entrega Flash</div>
        </div>
        <input type="text" id="search-input" placeholder="Buscar plataforma..." onkeyup="filtrarDinamico()">
        
        <div class="filter-wrapper">
            <div class="filter-container" id="filterScroll">
                <button class="btn-nav active" onclick="cambiarCategoria('TODOS', this)">TODOS</button>
                <button class="btn-nav" onclick="cambiarCategoria('🎬 STREAMING Y CINE', this)">PERFILES</button>
                <button class="btn-nav" onclick="cambiarCategoria('💻 DISEÑOS Y MAS', this)">DISEÑO</button>
                <button class="btn-nav" onclick="cambiarCategoria('📺 TELEVISIÓN DIGITAL', this)">TV DIGITAL</button>
                <button class="btn-nav" onclick="cambiarCategoria('🎵 MÚSICA Y VIDEO SIN LÍMITES', this)">MÚSICA</button> 
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="grid-botones" data-aos="zoom-in">
        <a href="../" class="btn-universal btn-inicio-top">🏠 INICIO</a>
        <a href="https://drive.google.com/file/d/1MPAECoht01Udr-oa7NcerexfZMC6h-5i/view?usp=sharing" target="_blank" class="btn-universal btn-referencias">⭐ REFERENCIAS</a>
        <a href="../promociones-clientes/" class="btn-universal btn-combos-premium">🎁 PROMOS</a>
        <a href="https://chat.whatsapp.com/Dhp57nuChw89kT6pb5kggS" target="_blank" class="btn-universal btn-comunidad">👥 COMUNIDAD</a>
    </div>

    <div id="contenedor-productos"></div>
</div>

<div id="whatsapp-btn" class="floating-btn hidden">
    <div class="cart-row" style="display:flex; justify-content:space-between; align-items:center;">
        <div onclick="abrirModalRegistro()" style="cursor:pointer; display:flex; align-items:center;">
            <span id="cart-count" style="background:rgba(0,0,0,0.2); padding:4px 12px; border-radius:10px;">0</span>
            <span style="margin-left:8px; font-weight:700;">PEDIR AHORA</span>
        </div>
        <div style="display:flex; align-items:center;">
            <span id="cart-total" style="font-size:1.3rem; margin-right:10px;">S/ 0</span>
            <i class="fas fa-trash-alt" onclick="limpiarCarrito()" style="cursor:pointer; opacity:0.6;"></i>
        </div>
    </div>
    <div id="discount-label" style="font-size:0.7rem; color:#f4d03f; display:none; margin-top:5px;"></div>
</div>

<div id="modal-password" class="modal-pass">
    <div class="modal-content">
        <h2 style="color:var(--primary);">ACCESO PRIVADO</h2>
        <input type="password" id="input-pass" placeholder="****" onkeydown="if(event.key==='Enter') validarPass()">
        <button onclick="validarPass()" class="btn-universal" style="background:var(--primary); width:100%; margin-top:10px;">INGRESAR</button>
    </div>
</div>

<div id="modal-registro" class="modal-overlay">
    <div class="modal-content">
        <div id="paso-1">
            <h2 style="color:var(--primary); margin-bottom:15px;">¿Ya eres cliente?</h2>
            <button class="btn-universal" style="background:#222; color:#fff; width:100%; margin-bottom:10px;" onclick="mostrarFormAntiguo()">SÍ, YA COMPRÉ</button>
            <button class="btn-universal" style="background:var(--primary); color:#000; width:100%;" onclick="mostrarForm()">SOY NUEVO</button>
            <button class="btn-universal" style="background:transparent; color:#555; width:100%;" onclick="cerrarModalRegistro()">CANCELAR</button>
        </div>
        <div id="form-datos" style="display:none;">
            <input type="text" id="reg-nom" placeholder="Tu Nombre" style="width:100%; padding:15px; margin-bottom:10px; border-radius:15px; background:#000; color:#fff; border:1px solid #333;">
            <input type="tel" id="reg-cel" placeholder="Tu WhatsApp" style="width:100%; padding:15px; margin-bottom:10px; border-radius:15px; background:#000; color:#fff; border:1px solid #333;">
            <input type="text" id="reg-per" placeholder="Nombre Perfil (Opcional)" style="width:100%; padding:15px; margin-bottom:10px; border-radius:15px; background:#000; color:#fff; border:1px solid #333;">
            <button class="btn-universal" style="background:var(--primary); color:#000; width:100%;" onclick="enviarWhatsApp('nuevo')">ENVIAR PEDIDO</button>
        </div>
        <div id="form-antiguo" style="display:none;">
            <input type="text" id="antiguo-per" placeholder="Nombre Perfil (Opcional)" style="width:100%; padding:15px; margin-bottom:10px; border-radius:15px; background:#000; color:#fff; border:1px solid #333;">
            <button class="btn-universal" style="background:var(--primary); color:#000; width:100%;" onclick="enviarWhatsApp('antiguo')">ENVIAR PEDIDO</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    // --- 1. BASE DE DATOS DE PRODUCTOS ---
    const PRODUCTOS = [
        { id: 1, nombre: "Netflix Premium", categoria: "🎬 STREAMING Y CINE", precio: 16, descripcion: "• Perfil Privado • 4K UHD.", imagen: "../img/netflix.webp", oferta: true, premium: true, badge: "MÁS SOLICITADO 🔥" },
        { id: 2, nombre: "Disney Premium", categoria: "🎬 STREAMING Y CINE", precio: 10, descripcion: "• Activación a TV • ESPN • Perfil privado.", imagen: "../img/disneyp.webp", oferta: true, premium: true, badge: "MUY SOLICITADO 🎁" },
        { id: 3, nombre: "Disney Premium (Sin ESPN)", categoria: "🎬 STREAMING Y CINE", precio: 7, descripcion: "• Sin canales ESPN • Perfil privado.", imagen: "../img/disneys.webp" },
        { id: 4, nombre: "Max Standard", categoria: "🎬 STREAMING Y CINE", precio: 5, descripcion: "• 1 mes • Full HD • Perfil privado.", imagen: "../img/max.webp" },
        { id: 5, nombre: "MAX Platino", categoria: "🎬 STREAMING Y CINE", precio: 8, descripcion: "• 1 mes • 4K UHD • Perfil privado.", imagen: "../img/max.webp" },
        { id: 6, nombre: "PRIME VIDEO (TV)", categoria: "🎬 STREAMING Y CINE", precio: 5, descripcion: "• Perfil privado • Solo TV.", imagen: "../img/prime.webp" },
        { id: 7, nombre: "PRIME VIDEO", categoria: "🎬 STREAMING Y CINE", precio: 8, descripcion: "• Correo y clave • Perfil privado.", imagen: "../img/prime.webp" },
        { id: 8, nombre: "VIX PREMIUM", categoria: "🎬 STREAMING Y CINE", precio: 5, descripcion: "• Premium • Perfil privado.", imagen: "../img/vix.webp", premium: true },
        { id: 9, nombre: "PARAMOUNT", categoria: "🎬 STREAMING Y CINE", precio: 6, descripcion: "• Plan premium • Perfil privado.", imagen: "../img/paramount.webp" },
        { id: 10, nombre: "CRUNCHYROLL", categoria: "🎬 STREAMING Y CINE", precio: 5, descripcion: "• Premium Fan • Perfil privado.", imagen: "../img/crunchyroll.webp" },
        { id: 11, nombre: "CANVA PRO (1 mes)", categoria: "💻 DISEÑOS Y MAS", precio: 5, descripcion: "• Invitación a tu correo.", imagen: "../img/canva.webp" },
        { id: 12, nombre: "CANVA PRO (12 meses)", categoria: "💻 DISEÑOS Y MAS", precio: 25, descripcion: "• Plan anual.", imagen: "../img/canva.webp" },
        { id: 15, nombre: "Movistar Play + Liga 1 Max", categoria: "📺 TELEVISIÓN DIGITAL", precio: 20, descripcion: "• Canal L1 Max • Perfil privado.", imagen: "../img/movistar.webp" },
        { id: 17, nombre: "Magis TV- Fluo TV", categoria: "📺 TELEVISIÓN DIGITAL", precio: 12, descripcion: "• +1200 Canales en vivo.", imagen: "../img/flujo.webp" },
        { id: 20, nombre: "Spotify Premium", categoria: "🎵 MÚSICA Y VIDEO SIN LÍMITES", precio: 8, descripcion: "• Sin anuncios • Cuenta propia.", imagen: "../img/spotify.webp", premium: true },
        { id: 21, nombre: "Youtube Premium", categoria: "🎵 MÚSICA Y VIDEO SIN LÍMITES", precio: 8, descripcion: "• Sin anuncios • Correo nuevo.", imagen: "../img/youtube.webp", premium: true, oferta: true, badge: "PROMO 🔥" }
    ];

    let carrito = [];
    const numWhatsApp = "51918600000";

    // --- 2. MOTOR DINÁMICO ---
   function renderizar(filtro = "TODOS", busqueda = "") {
    const contenedor = document.getElementById('contenedor-productos');
    let html = "";
    let ultimaCat = "";

    const filtrados = PRODUCTOS.filter(p => {
        const matchesCat = filtro === "TODOS" || p.categoria === filtro;
        const matchesSearch = p.nombre.toLowerCase().includes(busqueda.toLowerCase());
        return matchesCat && matchesSearch;
    });

    filtrados.forEach(p => {
        if (p.categoria !== ultimaCat) {
            html += `<div class="category-title" data-aos="fade-right">🎬 ${p.categoria}</div>`;
            ultimaCat = p.categoria;
        }

        const isSelected = carrito.some(i => i.nombre === p.nombre) ? 'selected' : '';
        
        html += `
            <div class="service-item ${p.premium ? 'premium' : ''} ${p.agotado ? 'agotado' : ''} ${isSelected}" 
                 onclick="toggleCarrito(this)" data-aos="fade-up">
                
                <div class="check-icon">✓</div>
                
                ${p.badge ? `<div class="badge-oferta">${p.badge}</div>` : ''}
                
                <div class="service-card">
                    <img src="${p.imagen}" class="service-logo">
                    
                    <div class="service-text" style="flex-grow: 1;">
                        <h3 class="nombre-prod" style="font-size: 1.1rem; font-weight: 700; margin-bottom: 2px;">${p.nombre}</h3>
                        <p class="manual-desc" style="font-size: 0.8rem; color: #aaa; margin: 0;">${p.descripcion}</p>
                    </div>

                    <div class="price-container" style="text-align: right; min-width: 90px;">
                        ${p.premium ? '<span class="premium-tag">PREMIUM</span>' : ''}
                        
                        <span class="price-tag precio-prod">
                            S/${p.precio}
                        </span>
                        
                        <div class="btn-consultar-neon" onclick="consultarStockManual(this, event)">SIN STOCK</div>
                    </div>
                </div>
            </div>`;
    });

    contenedor.innerHTML = html;
    setTimeout(() => { AOS.refreshHard(); }, 100);
}
    // --- 3. LÓGICA DE FUNCIONES ---
    function filtrarDinamico() {
        const busqueda = document.getElementById('search-input').value;
        renderizar("TODOS", busqueda);
    }

    function cambiarCategoria(cat, btn) {
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('search-input').value = "";
        renderizar(cat);
    }

    function toggleCarrito(el) {
        if (el.classList.contains('agotado')) return;
        const nombre = el.querySelector('.nombre-prod').innerText;
        const precio = parseFloat(el.querySelector('.precio-prod').innerText.replace('S/', ''));
        const idx = carrito.findIndex(i => i.nombre === nombre);
        if (idx > -1) { carrito.splice(idx, 1); } else { carrito.push({nombre, precio}); }
        actualizarUI();
        el.classList.toggle('selected');
    }

    function actualizarUI() {
        const subtotal = carrito.reduce((s, i) => s + i.precio, 0);
        const desc = (carrito.length >= 2) ? (carrito.length * 2) - 2 : 0; // Ejemplo simple de descuento
        document.getElementById('cart-count').innerText = carrito.length;
        document.getElementById('cart-total').innerText = `S/ ${subtotal - desc}`;
        document.getElementById('whatsapp-btn').classList.toggle('hidden', carrito.length === 0);
        const label = document.getElementById('discount-label');
        if (desc > 0) { label.innerText = `Ahorro: S/ ${desc} 🎁`; label.style.display='block'; } else { label.style.display='none'; }
    }

    function enviarWhatsApp(tipo) {
        let per = (tipo === 'nuevo') ? document.getElementById('reg-per').value : document.getElementById('antiguo-per').value;
        let msg = `Hola *Alex Store*, deseo:\n\n`;
        carrito.forEach(i => msg += `🔹 *${i.nombre}* (S/ ${i.precio})\n`);
        if (per) msg += `👤 *Perfil:* ${per}\n`;
        msg += `\n💰 *TOTAL: ${document.getElementById('cart-total').innerText}*`;
        window.open(`https://wa.me/${numWhatsApp}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    // --- INICIO ---
    document.addEventListener('DOMContentLoaded', () => {
        if (sessionStorage.getItem("acceso") === "ok") {
            document.documentElement.style.display = "block";
            renderizar();
            AOS.init();
        } else {
            document.documentElement.style.display = "block";
            document.getElementById('modal-password').style.display = 'flex';
        }
    });

    function validarPass() {
        if (document.getElementById('input-pass').value === "cliente") {
            sessionStorage.setItem("acceso", "ok");
            location.reload();
        } else { alert("Error"); }
    }

    function limpiarCarrito() {
        carrito = [];
        actualizarUI();
        renderizar();
    }
    
    function abrirModalRegistro() { document.getElementById('modal-registro').style.display='flex'; }
    function cerrarModalRegistro() { document.getElementById('modal-registro').style.display='none'; }
    function mostrarForm() { document.getElementById('paso-1').style.display='none'; document.getElementById('form-datos').style.display='block'; }
    function mostrarFormAntiguo() { document.getElementById('paso-1').style.display='none'; document.getElementById('form-antiguo').style.display='block'; }
</script>
</body>
</html>

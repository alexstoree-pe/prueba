<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV DISTRIBUIDOR | AlexStoree</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #39ff14; 
            --accent: #a020f0;  
            --dark-bg: #050505;
            --card-bg: #0f0f0f;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --glass-border: rgba(255, 255, 255, 0.1);
            --danger: #ff0000;
            --gold: #ffd700;
            --gold-shadow: rgba(255, 215, 0, 0.3);
            --select-blue: #00d4ff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--dark-bg); color: var(--text-main); padding-bottom: 140px; }

        header { padding: 40px 20px 20px; text-align: center; }
        .logo-container img { 
            width: 100px; height: 100px; border-radius: 50%; 
            border: 3px solid var(--accent); background-color: #000;
            box-shadow: 0 0 20px rgba(160, 32, 240, 0.4);
        }

        /* --- LÓGICA PREMIUM (Siempre Visible) --- */
        .service-link.premium .service-card { border-color: var(--gold) !important; box-shadow: 0 0 10px var(--gold-shadow); }
        .service-link.premium .price-tag, .service-link.premium .unit-price { color: var(--gold) !important; }
        .premium-tag { 
            display: none; font-size: 0.5rem; font-weight: 800; color: var(--gold); border: 1px solid var(--gold); 
            padding: 1px 4px; border-radius: 3px; text-transform: uppercase; margin-bottom: 2px;
        }
        .service-link.premium .premium-tag { display: inline-block; }

        /* --- SELECCIÓN (Celeste + Check) --- */
        .service-link.selected .service-card { 
            border-color: var(--select-blue) !important; 
            background: rgba(0, 212, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }
        .select-check { 
            display: none; position: absolute; top: 12px; right: 12px; 
            color: var(--select-blue); font-size: 1.2rem; z-index: 20; 
        }
        .service-link.selected .select-check { display: block; }

        /* --- TEMPORIZADOR Y BADGES --- */
        .timer-flash { 
            position: absolute; top: 0; left: 50%; transform: translateX(-50%); 
            background: var(--danger); color: white; padding: 2px 12px; 
            font-size: 0.65rem; font-weight: 800; border-radius: 0 0 10px 10px; 
            z-index: 50; display: flex; align-items: center; gap: 5px;
        }
        .badge-izq { position: absolute; top: 0; left: 0; background: var(--primary); color: #000; padding: 4px 10px; font-size: 0.6rem; font-weight: 900; z-index: 5; clip-path: polygon(0 0, 100% 0, 85% 100%, 0% 100%); }
        
        .badge-culminada { 
            display: none; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) rotate(-5deg); background: rgba(0,0,0,0.9); 
            color: var(--danger); padding: 10px; font-weight: 900; border: 2px solid var(--danger); 
            z-index: 110; text-align: center; width: 80%; 
        }
        .service-link.agotado .badge-culminada { display: block; }
        .service-link.agotado { pointer-events: none; opacity: 0.7; }

        /* --- GRID Y CARDS --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .grid-servicios { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; margin-top: 20px; }
        .service-link { text-decoration: none; color: inherit; cursor: pointer; position: relative; display: block; transition: 0.3s; }
        .service-card { background: var(--card-bg); border: 2px solid var(--glass-border); border-radius: 20px; padding: 18px; display: flex; align-items: center; gap: 15px; position: relative; overflow: hidden; height: 100%; }
        .service-logo { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; }
        .service-text { flex-grow: 1; }
        .service-text h3 { font-size: 0.9rem; margin-bottom: 2px; }
        .manual-desc { display: block; font-size: 10px; color: var(--text-dim); font-style: italic; }
        
        .price-container { text-align: right; display: flex; flex-direction: column; align-items: flex-end; min-width: 90px; }
        .price-tag { color: var(--primary); font-weight: 900; font-size: 1.1rem; }
        .unit-price { display: block; font-size: 9px; color: var(--text-dim); }

        /* --- BOTONES Y BUSCADOR --- */
        .sticky-tools { position: sticky; top: 0; background: var(--dark-bg); z-index: 1000; padding: 15px 0; border-bottom: 1px solid var(--glass-border); }
        .search-container { max-width: 500px; margin: 0 auto 15px; padding: 0 20px; }
        .search-container input { width: 100%; padding: 12px 20px; border-radius: 30px; border: 1px solid var(--glass-border); background: #151515; color: white; outline: none; }

        #cart-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: white; border-radius: 25px; display: none; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.5); cursor: pointer; }
        .cart-content { display: flex; align-items: center; padding: 12px 20px; color: black; font-weight: 800; }
    </style>
</head>
<body>

<header>
    <div class="logo-container"><img src="../img/logo.png" alt="AlexStoree"></div>
    <h1>SMARTERSPRO <span class="mayoristas">MAYORISTAS</span></h1>
</header>

<div class="sticky-tools">
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Buscar plataforma..." onkeyup="filtrarServicios()">
    </div>
</div>

<div class="container">
    <div class="grid-servicios">
        
        <div class="service-link premium" data-final="2026-12-31 23:59:59" onclick="toggleItem(this)">
            <div class="select-check"><i class="fa-solid fa-circle-check"></i></div>
            <div class="service-card">
                <div class="timer-flash"><i class="fa-solid fa-clock"></i> <span class="countdown">Cargando...</span></div>
                <div class="badge-culminada">CULMINADA</div>
                <span class="badge-izq">OFERTA</span>
                <img src="../img/n10.png" class="service-logo">
                <div class="service-text">
                    <h3>70 Créditos panel incluido</h3>
                    <span class="unit-price">S/ 3.28 por unidad</span>
                    <span class="manual-desc">Alta rentabilidad garantizada</span>
                </div>
                <div class="price-container">
                    <span class="premium-tag">Premium</span>
                    <div class="price-tag">S/ 230</div>
                </div>
            </div>
        </div>

    </div>
</div>

<div id="cart-bar" onclick="sendWhatsapp()">
    <div class="cart-content">
        <i class="fa-brands fa-whatsapp" style="font-size: 1.5rem; color: #25D366; margin-right: 15px;"></i>
        <div style="flex-grow: 1;">PEDIR <span id="cart-qty">0</span> ITEMS | TOTAL: <span id="cart-total">S/ 0.00</span></div>
    </div>
</div>

<script>
    // --- LÓGICA DEL TEMPORIZADOR ---
    function updateCountdowns() {
        const now = new Date().getTime();
        document.querySelectorAll('.service-link[data-final]').forEach(card => {
            const finalDate = new Date(card.getAttribute('data-final')).getTime();
            const distance = finalDate - now;
            const display = card.querySelector('.countdown');

            if (distance < 0) {
                display.innerHTML = "00d 00h 00m 00s";
                card.classList.add('agotado');
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            display.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
        });
    }
    setInterval(updateCountdowns, 1000);

    // --- LÓGICA DEL CARRITO ---
    let total = 0, cant = 0;
    let selectedItems = [];

    function toggleItem(el) {
        if(el.classList.contains('agotado')) return;
        el.classList.toggle('selected');
        
        const nombre = el.querySelector('h3').innerText;
        const precio = parseFloat(el.querySelector('.price-tag').innerText.replace('S/ ', ''));
        
        if(el.classList.contains('selected')) {
            total += precio; cant++;
            selectedItems.push({nombre, precio});
        } else {
            total -= precio; cant--;
            selectedItems = selectedItems.filter(i => i.nombre !== nombre);
        }
        
        document.getElementById('cart-qty').innerText = cant;
        document.getElementById('cart-total').innerText = "S/ " + total.toFixed(2);
        document.getElementById('cart-bar').style.display = cant > 0 ? "block" : "none";
    }

    function sendWhatsapp() {
        let msj = "¡Hola Alex Store! Deseo adquirir:\n\n";
        selectedItems.forEach(i => msj += `✅ *${i.nombre}* - S/ ${i.precio}\n`);
        msj += `\n*TOTAL: S/ ${total.toFixed(2)}*`;
        window.open(`https://wa.me/51918600000?text=${encodeURIComponent(msj)}`, '_blank');
    }

    function filtrarServicios() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.service-link').forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(input) ? "" : "none";
        });
    }
</script>
</body>
</html>

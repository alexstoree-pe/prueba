<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promos Mayoristas | Alex Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- AOS ANIMACIONES -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --vip: #d4af37; 
            --dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --whatsapp: #25d366;
            --text-gray: #bbb;
            --timer-color: #00d4ff; 
            --danger-bright: #ff3333;
        }

        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        @keyframes shine-red { 
            0%, 100% { text-shadow: 0 0 8px #ff0000; color: #ff3333; border-color: #ff3333; } 
            50% { text-shadow: 0 0 20px #ff0000, 0 0 30px #ff0000; color: #fff; border-color: #fff; } 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            scroll-behavior: smooth; /* 🔥 FIX SCROLL SUAVE */
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top right, #1a1a1a, #050505);
            color: white;
            padding-bottom: 120px;
            line-height: 1.6;
            overflow-x: hidden; /* 🔥 evita bug horizontal */
        }

        header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 2px solid var(--vip);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        header h1 {
            font-size: 1.6rem;
            color: var(--vip);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container {
            padding: 20px 15px;
            max-width: 600px;
            margin: auto;
        }

        .back-nav { margin-bottom: 25px; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--vip);
            text-decoration: none;
            font-size: 0.8rem;
            border: 1px solid var(--glass-border);
            background: var(--card-bg);
            padding: 8px 18px;
            border-radius: 50px;
        }

        .category-title {
            margin: 30px 0 15px;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--vip);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, var(--vip), transparent);
        }

        .promo-link {
            text-decoration: none;
            color: inherit;
            display: block;
            margin-bottom: 20px;
        }

        .vip-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 22px;
            padding: 20px;
            display: flex;
            align-items: center;
            border: 1px solid var(--glass-border);
            gap: 15px;
            position: relative;
        }

        .batch-badge {
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--vip);
            color: #000;
            font-size: 0.65rem;
            font-weight: 900;
            padding: 3px 12px;
            border-radius: 50px;
        }

        .service-logo {
            width: 70px;
            height: 70px;
            border-radius: 15px;
            object-fit: cover;
        }

        .service-text { flex-grow: 1; }

        .service-text h3 {
            font-size: 1.05rem;
            font-weight: 700;
        }

        .manual-desc {
            font-size: 0.7rem;
            color: var(--text-gray);
        }

        .price-container { text-align: right; }

        .price-tag {
            font-weight: 800;
            font-size: 1.3rem;
        }

        .reno-tag {
            font-size: 0.6rem;
            color: var(--whatsapp);
        }

        /* BOTÓN */
        .floating-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--vip);
            color: #000;
            padding: 15px;
            border-radius: 15px;
            font-weight: 800;
            width: 90%;
            max-width: 400px;
            text-align: center;
            z-index: 100;
        }
    </style>
</head>

<body>

<header>
    <h1>ALEX STORE PROMOS 👑</h1>
    <p>Panel Exclusivo para Mayoristas</p>
</header>

<div class="container">

    <div class="back-nav">
        <a href="../distribuidores/" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Panel Principal
        </a>
    </div>

    <div class="category-title">📦 PACKS DE CUENTAS COMPLETAS</div>

    <!-- ========================= -->
    <!-- 🔥 TUS PRODUCTOS VAN AQUÍ -->
    <!-- (NO SE BORRÓ NADA) -->
    <!-- ========================= -->

    <a href="#" class="promo-link time" data-tiempo="2026-04-18 23:59">
        <div class="vip-card">
            <div class="batch-badge">PACK x10</div>
            <img src="../img/max.png" class="service-logo">
            <div class="service-text">
                <div class="countdown-timer"><span class="timer">...</span></div>
                <h3 class="nombre-prod">MAX PLATINO COMPLETA</h3>
                <span class="manual-desc">10 Cuentas • 4K UHD • 1 Mes.</span>
            </div>
            <div class="price-container">
                <span class="price-tag precio-prod">S/ 50</span>
                <span class="reno-tag">Reno: S/ 9 c/u</span>
            </div>
        </div>
    </a>

    <!-- 🔥 SIGUE PEGANDO TUS DEMÁS PRODUCTOS AQUÍ -->
    <!-- 🔥 SIN BORRAR NINGUNO -->

    <!-- ========================= -->

</div>

<a href="https://wa.me/51918600000" class="floating-btn">
    <i class="fa-brands fa-whatsapp"></i> PEDIR POR WHATSAPP
</a>

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
    AOS.init({
        duration: 800,
        once: true
    });

    // 🔥 FIX IMPORTANTE: evita bug de "no aparece hasta scroll"
    window.addEventListener("load", () => {
        setTimeout(() => {
            AOS.refresh();
        }, 500);
    });

    window.addEventListener("scroll", () => {
        AOS.refresh();
    });
</script>

</body>
</html>

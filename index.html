<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV DISTRIBUIDOR | AlexStoree</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #39ff14; 
            --accent: #9d00ff;  
            --dark-bg: #050505;
            --card-bg: #0f0f0f;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --glass-border: rgba(255, 255, 255, 0.1);
            --danger: #ff4444;
        }

        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--dark-bg); color: var(--text-main); padding-bottom: 120px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* GADGETS MANUALES */
        .badge-izq { display: none; position: absolute; top: 0; left: 0; background: var(--primary); color: #000; padding: 4px 12px; font-size: 0.6rem; font-weight: 900; z-index: 5; clip-path: polygon(0 0, 100% 0, 85% 100%, 0% 100%); }
        .service-link.oferta .badge-izq { display: block; }

        .badge-der { display: none; position: absolute; top: 0; right: 0; background: var(--accent); color: #fff; padding: 4px 12px; font-size: 0.6rem; font-weight: 900; z-index: 5; clip-path: polygon(15% 0, 100% 0, 100% 100%, 0% 100%); }
        .service-link.nuevo .badge-der { display: block; }

        /* GADGET TEMPORIZADOR FLASH */
        .timer-flash {
            display: none; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            background: var(--danger); color: white; padding: 2px 10px; font-size: 0.65rem;
            font-weight: 800; border-radius: 0 0 10px 10px; z-index: 10;
        }
        .service-link.flash .timer-flash { display: flex; align-items: center; gap: 5px; }

        /* ESTADO: OFERTA CULMINADA (BLOQUEO) */
        .badge-culminada { 
            display: none; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) rotate(-10deg); 
            background: #222; color: var(--danger); padding: 8px 15px; 
            font-weight: 900; font-size: 0.9rem; border: 2px solid var(--danger); 
            z-index: 30; white-space: nowrap; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.3);
        }

        /* Cuando la oferta termina o no hay stock */
        .service-link.flash-terminado { cursor: not-allowed !important; pointer-events: none; opacity: 0.4; filter: grayscale(1); }
        .service-link.flash-terminado .badge-culminada { display: block; }
        .service-link.flash-terminado .price-container, 
        .service-link.flash-terminado .badge-izq, 
        .service-link.flash-terminado .badge-der, 
        .service-link.flash-terminado .timer-flash { display: none !important; }

        /* TARJETAS ESTILO BASE */
        .grid-servicios { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 20px; }
        .service-link { cursor: pointer; position: relative; transition: 0.3s; }
        .service-card { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 18px; display: flex; align-items: center; gap: 15px; height: 100%; position: relative; overflow: hidden; }
        
        .service-logo { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; }
        .service-text h3 { font-size: 0.9rem; font-weight: 800; }
        .price-container { margin-left: auto; text-align: right; }
        .price-tag { display: block; font-size: 1.1rem; font-weight: 900; color: var(--primary); }

        .category-header { margin: 40px 0; }
        .category-title { font-weight: 800; font-size: 1.1rem; border-left: 4px solid var(--accent); padding-left: 15px; text-transform: uppercase; }

        /* CARRITO */
        #cart-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; background: #fff; color: #000; border-radius: 25px; padding: 15px; display: none; z-index: 2000; }
        .btn-send { background: #000; color: #fff; width: 100%; padding: 14px; border-radius: 15px; text-align: center; font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div class="container">

    <div class="category-header">
        <div class="category-title">PLANES INDIVIDUALES</div>
        <div class="grid-servicios">
            
            <div class="service-link flash oferta" data-final="2026-04-20 20:00:00" onclick="toggleItem(this)">
                <div class="service-card">
                    <div class="timer-flash"><i class="fa-solid fa-clock"></i> <span class="countdown">00d 00h 00m 00s</span></div>
                    
                    <span class="badge-culminada">OFERTA FLASH CULMINADA</span>
                    
                    <span class="badge-izq">OFERTA ESPECIAL</span>
                    <span class="badge-der">FLASH</span>
                    
                    <img src="../img/u1.png" class="service-logo">
                    <div class="service-text"><h3>IPTV Premium - 1 Mes</h3></div>
                    <div class="price-container"><span class="price-tag">S/ 10</span></div>
                </div>
            </div>

            <div class="service-link" onclick="toggleItem(this)">
                <div class="service-card">
                    <span class="badge-culminada">AGOTADO</span>
                    <img src="../img/u1.png" class="service-logo">
                    <div class="service-text"><h3>IPTV Premium - 3 Meses</h3></div>
                    <div class="price-container"><span class="price-tag">S/ 28</span></div>
                </div>
            </div>

            <div class="service-link" onclick="toggleItem(this)">
                <div class="service-card">
                    <span class="badge-culminada">AGOTADO</span>
                    <img src="../img/u1.png" class="service-logo">
                    <div class="service-text"><h3>IPTV Premium - 6 Meses</h3></div>
                    <div class="price-container"><span class="price-tag">S/ 50</span></div>
                </div>
            </div>

            <div class="service-link" onclick="toggleItem(this)">
                <div class="service-card">
                    <span class="badge-culminada">AGOTADO</span>
                    <img src="../img/u1.png" class="service-logo">
                    <div class="service-text"><h3>IPTV Premium - 12 Meses</h3></div>
                    <div class="price-container"><span class="price-tag">S/ 90</span></div>
                </div>
            </div>

        </div>
    </div>

</div>

<div id="cart-bar">
    <div class="btn-send" onclick="enviarWhatsApp()">
        <span id="cart-qty">0</span> ENVIAR PEDIDO <span id="cart-total">S/ 0.00</span>
    </div>
</div>

<script>
    // MOTOR DE CUENTA REGRESIVA Y BLOQUEO
    function updateTimers() {
        const now = new Date().getTime();
        
        document.querySelectorAll('.service-link.flash').forEach(card => {
            const finalStr = card.getAttribute('data-final');
            const targetDate = new Date(finalStr).getTime();
            const distance = targetDate - now;
            const display = card.querySelector('.countdown');

            // Si el tiempo se agota
            if (distance <= 0) {
                card.classList.add('flash-terminado');
                card.classList.remove('selected'); // Deselecciona si estaba marcada
                if (display) display.innerHTML = "00d 00h 00m 00s";
                recalcular(); // Actualiza el carrito para quitar el item bloqueado
            } else {
                // Si aún hay tiempo, nos aseguramos que no esté bloqueada
                card.classList.remove('flash-terminado');
                
                const d = Math.floor(distance / (1000 * 60 * 60 * 24));
                const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((distance % (1000 * 60)) / 1000);
                
                display.innerHTML = `${d}d ${h}h ${m}m ${s}s`;
            }
        });
    }

    // Ejecutar cada segundo
    setInterval(updateTimers, 1000);

    // LÓGICA DE SELECCIÓN
    let carrito = [];
    function toggleItem(el) {
        // Si tiene la clase de bloqueo por tiempo, no hace nada
        if(el.classList.contains('flash-terminado')) return;
        
        el.classList.toggle('selected');
        el.style.borderColor = el.classList.contains('selected') ? "var(--primary)" : "var(--glass-border)";
        recalcular();
    }

    function recalcular() {
        carrito = [];
        document.querySelectorAll('.service-link.selected').forEach(el => {
            const nombre = el.querySelector('h3').innerText;
            const precio = parseFloat(el.querySelector('.price-tag').innerText.replace('S/ ', ''));
            carrito.push({ nombre, precio });
        });
        const suma = carrito.reduce((s, p) => s + p.precio, 0);
        document.getElementById('cart-qty').innerText = carrito.length;
        document.getElementById('cart-total').innerText = `S/ ${suma.toFixed(2)}`;
        document.getElementById('cart-bar').style.display = (carrito.length > 0) ? 'block' : 'none';
    }

    function enviarWhatsApp() {
        if(carrito.length === 0) return;
        let msg = "¡Hola Alex Store! Deseo adquirir:\n\n";
        carrito.forEach(p => msg += `✅ ${p.nombre} - S/ ${p.precio}\n`);
        msg += `\n💰 TOTAL: S/ ${carrito.reduce((s, p) => s + p.precio, 0).toFixed(2)}`;
        window.open(`https://wa.me/51918600000?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>

</body>
</html>

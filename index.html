<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Incidencias | Seguridad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>Central de Reportes de Seguridad</h1>
        <p>Base de datos interna para el seguimiento de fraudes y cuentas falsas.</p>
    </header>

    <section class="form-section">
        <h3>Registrar Nueva Incidencia</h3>
        <form id="reportForm">
            <div class="input-group">
                <input type="text" id="phoneInput" placeholder="Número de celular (Ej: 987654321)" required>
                <input type="text" id="typeInput" placeholder="Tipo de incidencia (Ej: Yape Fake)" required>
                <input type="date" id="dateInput" required>
                <button type="submit" class="btn-add">Registrar Reporte</button>
            </div>
        </form>
    </section>

    <section class="search-section">
        <input type="text" id="searchInput" placeholder="Buscar por número (formato libre)...">
    </section>

    <section class="table-section">
        <table id="reportsTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Número Reportado</th>
                    <th>Incidencia</th>
                    <th>Fecha del Reporte</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </section>
</div>

<script>
    const reportForm = document.getElementById('reportForm');
    const tableBody = document.getElementById('tableBody');
    const searchInput = document.getElementById('searchInput');
    let reports = [];

    // Función para dar formato al número (separa números pegados)
    function formatPhoneNumber(num) {
        // Elimina cualquier carácter que no sea número
        let clean = num.replace(/\D/g, '');
        // Formato sugerido: XXX XXX XXX
        return clean.replace(/(\d{3})(\d{3})(\d{3})/, '$1 $2 $3');
    }

    // Renderizar la tabla
    function renderTable(data = reports) {
        tableBody.innerHTML = '';
        data.forEach((item, index) => {
            const row = `<tr>
                <td>${index + 1}</td>
                <td class="phone-cell">${formatPhoneNumber(item.phone)}</td>
                <td><span class="badge">${item.type}</span></td>
                <td>${item.date}</td>
            </tr>`;
            tableBody.insertAdjacentHTML('afterbegin', row); // Orden cronológico (último arriba)
        });
    }

    // Evento Guardar
    reportForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const newReport = {
            phone: document.getElementById('phoneInput').value,
            type: document.getElementById('typeInput').value,
            date: document.getElementById('dateInput').value
        };
        reports.push(newReport);
        renderTable();
        reportForm.reset();
    });

    // Lógica del Buscador (Ignora espacios y guiones)
    searchInput.addEventListener('input', (e) => {
        const term = e.target.value.replace(/\D/g, '');
        const filtered = reports.filter(r => r.phone.replace(/\D/g, '').includes(term));
        renderTable(filtered);
    });
</script>

</body>
</html>

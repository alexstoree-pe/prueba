<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribución VIP | Alex Store</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00d4ff; /* Celeste */
            --dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --danger-neon: #ff0000;
            --vip: #d4af37;
            --success-neon: #39ff14;
            --gold-gradient: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }

        html { background-color: var(--dark); scroll-behavior: smooth; }

        @keyframes shine-red { 
            0%, 100% { text-shadow: 0 0 10px var(--danger-neon), 0 0 20px var(--danger-neon); color: var(--danger-neon); border-color: var(--danger-neon); box-shadow: inset 0 0 10px var(--danger-neon), 0 0 10px var(--danger-neon); } 
            50% { text-shadow: 0 0 30px var(--danger-neon), 0 0 50px var(--danger-neon); color: #fff; border-color: #fff; box-shadow: inset 0 0 20px var(--danger-neon), 0 0 25px var(--danger-neon); } 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0a0a0a; color: white; padding-bottom: 200px; overflow-x: hidden; }

        header { 
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); padding: 40px 20px 20px; 
            text-align: center; border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 2000; 
        }
        .brand-logo { width: 75px; height: 75px; object-fit: contain; border-radius: 20px; margin-bottom: 10px; }
        
        .grid-botones { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px auto; max-width: 500px; padding: 0 15px; }
        .btn-universal { display: flex; align-items: center; justify-content: center; padding: 14px; border-radius: 15px; text-decoration: none; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; border: none; cursor: pointer; transition: 0.3s; }
        .btn-inicio { background: var(--glass); color: #fff; border: 1px solid var(--glass-border); }
        .btn-promo-distri { background: var(--gold-gradient); color: #000; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }

        .container { padding: 10px 15px; max-width: 600px; margin: auto; }
        .category-title { margin: 35px 0 15px; font-size: 0.9rem; font-weight: 800; color: var(--primary); letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }

        .service-link { position: relative; text-decoration: none; color: inherit; display: block; margin-bottom: 30px; cursor: pointer; overflow: visible; }
        .service-card { background: #0f0f0f; border-radius: 25px; padding: 22px; display: flex; align-items: center; border: 1px solid var(--glass-border); gap: 18px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; z-index: 10; overflow: visible; }
        
        .service-link.selected .service-card { border-color: var(--primary); background: rgba(0, 212, 255, 0.08); transform: scale(0.97); }
        .check-icon { position: absolute; top: -5px; right: -5px; background: var(--primary); color: #000; width: 28px; height: 28px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 0.9rem; z-index: 101; border: 2px solid #000; }
        .service-link.selected .check-icon { display: flex; }

        /* ESTILO PREMIUM */
        .service-link.premium .service-card { border: 2px solid var(--vip); box-shadow: 0 0 15px rgba(212, 175, 55, 0.15); }

        /* BADGE OFERTA INTEGRADO */
        .badge-oferta { 
            position: absolute; top: 0; left: 0; 
            background: #f1c40f; color: #000; 
            padding: 5px 15px; border-radius: 0 0 15px 0; 
            font-size: 0.6rem; font-weight: 900; z-index: 100;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        /* TEXTO PREMIUM DORADO */
        .premium-text { 
            display: none; 
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 0.65rem; font-weight: 900; 
            text-transform: uppercase; margin-right: 15px; margin-bottom: 2px; 
        }
        .premium .premium-text { display: block; }

        .status-badge { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
        .disponible .status-badge { color: var(--success-neon); }
        .pocas .status-badge { color: #ff3333; }

        .service-logo { width: 65px; height: 65px; object-fit: cover; border-radius: 18px; }
        .service-text h3 { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 2px; }
        .manual-desc { font-size: 0.75rem; color: #888; display: block; }
        
        .price-container { display: flex; flex-direction: column; align-items: flex-end; margin-left: auto; }

        /* PRECIO CELESTE POR DEFECTO */
        .price-tag { color: var(--primary); font-weight: 800; font-size: 1.4rem; }

        /* PRECIO DORADO SI ES PREMIUM */
        .premium .price-tag {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: var(--vip); /* Fallback */
        }

        /* RENOVACIÓN SIN FONDO */
        .badge-renovacion { 
            display: none; 
            color: #f1c40f; 
            font-size: 0.55rem; 
            font-weight: 700; 
            margin-top: 3px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        .renovacion .badge-renovacion { display: inline-block; }

        .service-link.agotado { pointer-events: none; opacity: 0.5; }
        .service-link.agotado::after { 
            content: "SIN STOCK"; position: absolute; top: 50%; right: 25px; transform: translateY(-50%);
            font-size: 0.8rem; font-weight: 900; border: 2.5px solid var(--danger-neon); 
            padding: 8px 15px; border-radius: 12px; animation: shine-red 1.5s infinite; 
            z-index: 200; background: #000;
        }

        .floating-btn { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            background: linear-gradient(135deg, #25d366, #128c7e); color: white; 
            padding: 18px 25px; border-radius: 22px; width: 92%; max-width: 480px; 
            z-index: 3000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<header>
    <img src="../img/logo.png" class="brand-logo">
    <h1>DISTRIBUIDORES VIP</h1>
</header>

<div class="grid-botones">
    <a href="../" class="btn-universal btn-inicio"><i class="fa-solid fa-house"></i> INICIO</a>
    <a href="../promos-distribuidores/" class="btn-universal btn-promo-distri"><i class="fa-solid fa-crown"></i> PROMOS</a>
</div>

<div class="container">
    <div class="category-title"><i class="fa-solid fa-star"></i> LO MÁS VENDIDO</div>

    <div class="service-link premium disponible renovacion" onclick="toggleSeleccion(this)" data-aos="fade-up">
        <div class="service-card">
            <span class="badge-oferta">OFERTA 🔥</span>
            <div class="check-icon"><i class="fa-solid fa-check"></i></div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Netflix-new-icon.png" class="service-logo">
            <div class="service-text">
                <div class="status-badge">DISPONIBLE</div>
                <h3 class="nombre-prod">Netflix Perfil</h3>
                <span class="manual-desc">4K UHD • Privado</span>
            </div>
            <div class="price-container">
                <span class="premium-text">Premium</span>
                <span class="price-tag precio-prod">S/ 12</span>
                <span class="badge-renovacion">Disponible para Renovación</span>
            </div>
        </div>
    </div>

    <div class="service-link pocas" onclick="toggleSeleccion(this)" data-aos="fade-up">
        <div class="service-card">
            <span class="badge-oferta">OFERTA 🔥</span>
            <div class="check-icon"><i class="fa-solid fa-check"></i></div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Amazon_Prime_Video_Logo.png" class="service-logo">
            <div class="service-text">
                <div class="status-badge">POCAS UNIDADES</div>
                <h3 class="nombre-prod">Prime Video</h3>
                <span class="manual-desc">Cuenta completa</span>
            </div>
            <div class="price-container">
                <span class="price-tag precio-prod">S/ 7</span>
            </div>
        </div>
    </div>
</div>

<div id="whatsapp-btn" class="floating-btn" onclick="enviarPedido()">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="display:flex; align-items:center; gap:10px;">
            <span id="cart-count" style="background:rgba(0,0,0,0.3); padding:5px 12px; border-radius:12px; font-weight:800;">0</span>
            <span style="font-weight:800; text-transform:uppercase; font-size:0.9rem;">Pedir por WhatsApp</span>
        </div>
        <span id="cart-total" style="font-weight:800; font-size:1.2rem;">S/ 0.00</span>
    </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ duration: 800, once: true });
    
    let carrito = [];

    function toggleSeleccion(elemento) {
        const nombre = elemento.querySelector('.nombre-prod').innerText;
        const precioTexto = elemento.querySelector('.precio-prod').innerText;
        const precio = parseFloat(precioTexto.replace('S/ ', ''));
        const index = carrito.findIndex(p => p.nombre === nombre);

        if (index > -1) {
            carrito.splice(index, 1);
            elemento.classList.remove('selected');
        } else {
            carrito.push({ nombre, precio });
            elemento.classList.add('selected');
        }
        actualizarCarritoUI();
    }

    function actualizarCarritoUI() {
        const contador = document.getElementById('cart-count');
        const totalTxt = document.getElementById('cart-total');
        const barra = document.getElementById('whatsapp-btn');
        const totalSoles = carrito.reduce((sum, p) => sum + p.precio, 0);
        
        contador.innerText = carrito.length;
        totalTxt.innerText = `S/ ${totalSoles.toFixed(2)}`;
        barra.style.display = carrito.length > 0 ? 'block' : 'none';
    }

    function enviarPedido() {
        if (carrito.length === 0) return;
        let mensaje = "¡Hola Alex Store! 👋 Deseo adquirir:\n\n";
        carrito.forEach(p => mensaje += `✅ ${p.nombre} - S/ ${p.precio}\n`);
        const totalSoles = carrito.reduce((sum, p) => sum + p.precio, 0);
        mensaje += `\n💰 *TOTAL: S/ ${totalSoles.toFixed(2)}*`;
        const fone = "51918600000"; 
        window.open(`https://wa.me/${fone}?text=${encodeURIComponent(mensaje)}`, '_blank');
    }
</script>
</body>
</html>

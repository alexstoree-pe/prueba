<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Premium | Alex Store</title>

    <link rel="icon" type="image/png" href="https://alexstoree-pe.github.io/tienda-alex/catalogo/img/logo.webp">
    <link rel="apple-touch-icon" href="https://alexstoree-pe.github.io/tienda-alex/catalogo/img/logo.webp">

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    :root {
        --primary: #00d4ff;
        --secondary: #0055ff;
        --dark: #050505;
        --glass: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.08);
        --whatsapp: #25d366;
        --promo: #f4d03f;
        --promo-dark: #d4af37;
        --danger: #ff4444; 
        --gold-gradient: linear-gradient(45deg, #d4af37, #f4d03f);
    }

    html { display: none; background-color: var(--dark); scroll-behavior: smooth; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { 
        font-family: 'Poppins', sans-serif; 
        background: radial-gradient(circle at top right, #0a0a0a, #050505);
        color: white; 
        line-height: 1.6; 
        padding-bottom: 100px; 
    }

    /* --- HEADER Y NAVEGACIÓN --- */
    header {
        background: rgba(10, 10, 10, 0.7);
        backdrop-filter: blur(20px);
        padding: 15px 15px 10px; 
        text-align: center;
        border-bottom: 1px solid var(--glass-border);
        position: sticky;
        top: 0;
        z-index: 2000;
    }

    .brand-logo { width: 50px; height: 50px; object-fit: contain; border-radius: 18px; margin-bottom: 5px; }

    header h1 { 
        font-size: 1.4rem; font-weight: 800; 
        background: linear-gradient(to right, #fff, var(--primary));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .search-container { max-width: 600px; margin: 10px auto 0; position: relative; }
    #search-input {
        width: 100%; padding: 8px 15px; border-radius: 15px; border: 1px solid var(--glass-border);
        background: rgba(255,255,255,0.05); color: white; font-family: 'Poppins'; outline: none; transition: 0.3s;
    }

    .container { padding: 20px 15px; max-width: 600px; margin: auto; transition: all 0.4s ease; }

    .category-title { margin: 25px 0 15px; font-size: 0.9rem; font-weight: 700; color: var(--primary); letter-spacing: 3px; text-transform: uppercase; }

    /* --- TARJETAS (CORRECCIÓN DE MOVIMIENTO) --- */
    .service-item { 
        cursor: pointer; 
        margin-bottom: 15px; 
        position: relative; 
        /* La transición se aplica a todo el item */
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    }

    .service-card { 
        background: var(--glass); border-radius: 22px; padding: 18px; 
        display: flex; align-items: center; border: 1px solid var(--glass-border); 
        gap: 15px; position: relative; overflow: visible; /* Cambiado a visible para no cortar badges */
        transition: 0.3s;
    }

    /* PREMIUM ESTILO */
    .premium .service-card {
        border: 1px solid #d4af37 !important;
        background: linear-gradient(135deg, rgba(212, 175, 55, 0.05), rgba(0,0,0,0));
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
    }

    /* BADGE OFERTA: Ahora se mueve con el padre */
    .badge-oferta { 
        position: absolute; top: -1px; left: 20px; 
        background: var(--promo); color: #000; 
        padding: 2px 12px; border-radius: 0 0 10px 10px; 
        font-size: 0.6rem; font-weight: 800; text-transform: uppercase; 
        display: none; z-index: 11; 
    }
    .service-item.oferta .badge-oferta { display: block; }

    /* TEXTO PREMIUM: Ahora se mueve con el padre */
    .premium::after { 
        content: 'PREMIUM'; position: absolute; top: 10px; right: 45px; 
        font-size: 0.5rem; font-weight: 900; color: #d4af37; 
        letter-spacing: 1px; border: 1px solid #d4af37; 
        padding: 1px 5px; border-radius: 4px; z-index: 11;
    }

    /* --- HOVER Y SELECCIÓN (EL "HUNDIMIENTO" TOTAL) --- */
    .service-item:hover { transform: translateY(-3px); }

    /* Cuando se selecciona, TODO el service-item se encoge, incluyendo badges y texto premium */
    .service-item.selected {
        transform: scale(0.95) !important;
    }

    .service-item.selected .service-card {
        border-color: var(--primary) !important;
        background: rgba(0, 212, 255, 0.12) !important;
        box-shadow: 0 0 25px rgba(0, 212, 255, 0.25);
    }

    .service-item.premium.selected .service-card {
        border-color: #f4d03f !important;
        background: linear-gradient(135deg, rgba(244, 208, 63, 0.15), rgba(0,0,0,0.4)) !important;
        box-shadow: 0 0 25px rgba(244, 208, 63, 0.3);
    }

    /* --- ELEMENTOS INTERNOS --- */
    .check-icon {
        position: absolute; top: 12px; right: 12px;
        background: var(--primary); color: #000;
        width: 26px; height: 26px; border-radius: 50%;
        display: none; align-items: center; justify-content: center;
        font-size: 0.85rem; font-weight: 900; z-index: 20;
    }
    .selected .check-icon { display: flex !important; animation: popCheck 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .premium.selected .check-icon { background: #f4d03f; }

    .service-logo { width: 60px; height: 60px; object-fit: cover; border-radius: 15px; }
    .service-text { flex-grow: 1; } 
    .service-text h3 { font-size: 1.05rem; color: #fff; }
    .manual-desc { font-size: 0.75rem; color: #777; }
    .price-tag { color: var(--primary); font-weight: 700; font-size: 1.25rem; }
    .premium .price-tag { background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* --- VISTA CUADRÍCULA --- */
    .container.grid-mode { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .grid-mode .service-card { flex-direction: column; text-align: center; min-height: 220px; justify-content: center; }
    .grid-mode .badge-oferta { left: 50%; transform: translateX(-50%); width: 80%; text-align: center; }
    .grid-mode .premium::after { top: 40px; right: 10px; }

    /* Botones y otros */
    .btn-view { background: #111; border: 1px solid #333; color: #666; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
    .btn-view.active { color: var(--primary); border-color: var(--primary); }

    .floating-btn { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #25d366, #128c7e); color: white; padding: 20px; border-radius: 25px; width: 92%; max-width: 480px; z-index: 1000; }
    .hidden { display: none; }

    @keyframes popCheck { 0% { transform: scale(0); } 100% { transform: scale(1); } }
</style>
</head>
<body>

<header>
    <img src="../img/logo.webp" class="brand-logo">
    <h1>ALEX STORE</h1>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Buscar plataforma..." onkeyup="filtrarProductos()">
    </div>
    <div style="margin-top: 15px; display: flex; justify-content: center; gap: 10px;">
        <button class="btn-view active" onclick="cambiarVista('list', this)"><i class="fas fa-list"></i></button>
        <button class="btn-view" onclick="cambiarVista('grid', this)"><i class="fas fa-th-large"></i></button>
    </div>
</header>

<div class="container">
    <div class="category-title">🎬 STREAMING Y CINE</div>

    <div class="service-item oferta premium" onclick="toggleCarrito(this)" data-aos="fade-up">
        <div class="badge-oferta">MÁS SOLICITADO 🔥</div>
        <div class="service-card">
            <div class="check-icon">✓</div>
            <img src="../img/netflix.webp" class="service-logo">
            <div class="service-text">
                <h3 class="nombre-prod">Netflix Premium</h3>
                <span class="manual-desc">• Perfil Privado • 4K UHD.</span>
            </div>
            <div class="price-container">
                <span class="price-tag precio-prod">S/ 16</span>
            </div>
        </div>
    </div>

    <div class="service-item oferta premium" onclick="toggleCarrito(this)" data-aos="fade-up">
        <div class="badge-oferta">MUY SOLICITADO 🎁</div>
        <div class="service-card">
            <div class="check-icon">✓</div>
            <img src="../img/disneyp.webp" class="service-logo">
            <div class="service-text">
                <h3 class="nombre-prod">Disney Premium</h3>
                <span class="manual-desc">• Activación TV • ESPN.</span>
            </div>
            <div class="price-container">
                <span class="price-tag precio-prod">S/ 10</span>
            </div>
        </div>
    </div>
</div>

<div id="whatsapp-btn" class="floating-btn hidden">
    <div style="display: flex; justify-content: space-between; align-items: center; font-weight: 800;">
        <span>SOLICITAR PEDIDO</span>
        <span id="cart-total">S/ 0</span>
    </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init();
    let carrito = [];

    // Función para manejar la selección
    function toggleCarrito(elemento) {
        elemento.classList.toggle('selected');
        
        const nombre = elemento.querySelector('.nombre-prod').innerText;
        const precio = parseFloat(elemento.querySelector('.precio-prod').innerText.replace('S/', ''));
        const idx = carrito.findIndex(i => i.nombre === nombre);

        if (idx > -1) { carrito.splice(idx, 1); } 
        else { carrito.push({nombre, precio}); }
        
        actualizarUI();
    }

    function actualizarUI() {
        const total = carrito.reduce((s, i) => s + i.precio, 0);
        document.getElementById('cart-total').innerText = `S/ ${total}`;
        document.getElementById('whatsapp-btn').classList.toggle('hidden', carrito.length === 0);
    }

    function cambiarVista(modo, btn) {
        const container = document.querySelector('.container');
        document.querySelectorAll('.btn-view').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        container.className = modo === 'grid' ? 'container grid-mode' : 'container';
        AOS.refresh();
    }

    function filtrarProductos() {
        const busqueda = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('.service-item').forEach(item => {
            const nombre = item.querySelector('.nombre-prod').innerText.toLowerCase();
            item.style.display = nombre.includes(busqueda) ? 'block' : 'none';
        });
    }

    // Mostrar body al cargar (por el display:none en el head)
    window.onload = () => { document.documentElement.style.display = "block"; };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Premium | Alex Store</title>
    <link rel="icon" type="image/png" href="https://alexstoree-pe.github.io/tienda-alex/catalogo/img/logo.webp">
    <link rel="apple-touch-icon" href="https://alexstoree-pe.github.io/tienda-alex/catalogo/img/logo.webp">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    :root {
        --primary: #00d4ff;
        --secondary: #0055ff;
        --dark: #050505;
        --glass: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.08);
        --whatsapp: #25d366;
        --promo: #f4d03f;
        --promo-dark: #d4af37;
        --danger: #ff4444; 
        --gold-gradient: linear-gradient(45deg, #d4af37, #f4d03f, #b38728);
    }

    html { display: none; background-color: var(--dark); scroll-behavior: smooth; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { 
        font-family: 'Poppins', sans-serif; 
        background: radial-gradient(circle at top right, #0a0a0a, #050505);
        color: white; 
        line-height: 1.4; 
        padding-bottom: 100px; 
        position: relative;
    }

    body::before {
        content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
        opacity: 0.03; pointer-events: none; z-index: 10000;
    }

    /* --- COMPONENTES DE INTERFAZ --- */
    #progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 3px; z-index: 3000; background: transparent; }
    #progress-bar { height: 100%; width: 0%; background: var(--primary); box-shadow: 0 0 10px var(--primary); }

    #search-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.85);
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        opacity: 0; visibility: hidden; z-index: 1500; transition: 0.4s;
    }
    body.searching #search-overlay { opacity: 1; visibility: visible; }
    body.searching header { z-index: 2100; }
    body.searching .service-item { position: relative; z-index: 2200; }

    /* --- HEADER --- */
    header {
        background: rgba(10, 10, 10, 0.7);
        backdrop-filter: blur(25px) saturate(180%);
        padding: 12px 10px 8px; text-align: center;
        border-bottom: 1px solid var(--glass-border);
        position: sticky; top: 0; z-index: 2000;
    }

    .brand-logo { width: 40px; height: 40px; border-radius: 12px; margin-bottom: 4px; }
    header h1 { font-size: 1.2rem; font-weight: 800; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .trust-bar { display: flex; justify-content: center; gap: 15px; margin: 6px 0; }
    .trust-item { display: flex; align-items: center; gap: 5px; font-size: 0.45rem; font-weight: 700; color: #aaa; text-transform: uppercase; }
    .trust-item i { color: var(--primary); font-size: 0.7rem; }

    /* --- BUSCADOR Y FILTROS --- */
    .search-container { max-width: 600px; margin: 8px auto 0; position: relative; padding: 0 10px; }
    #search-input { 
        width: 100%; padding: 14px 18px; border-radius: 15px; border: 1px solid var(--glass-border); 
        background: rgba(255,255,255,0.05); color: white; outline: none; font-size: 0.9rem; z-index: 2200; position: relative;
    }
    
    .filter-wrapper { margin: 12px 0; position: relative; display: flex; align-items: center; gap: 8px; }
    .filter-container { display: flex; gap: 12px; overflow-x: auto; padding: 10px 5px; scrollbar-width: none; flex-grow: 1; }
    .filter-container::-webkit-scrollbar { display: none; }
    
    .scroll-indicator { 
        background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: var(--primary); 
        width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 5; flex-shrink: 0;
    }

    .btn-nav { background: var(--glass); border: 1px solid var(--glass-border); color: white; padding: 8px 20px; border-radius: 50px; font-size: 0.7rem; font-weight: 700; cursor: pointer; white-space: nowrap; transition: 0.3s; }
    .btn-nav.active { background: var(--primary); color: #000; border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }

    /* --- CATEGORÍAS Y TARJETAS --- */
    .category-title { 
        margin: 35px 0 18px; padding: 12px 18px; font-size: 0.9rem; font-weight: 800; 
        color: var(--primary); background: rgba(255,255,255,0.04); 
        border-radius: 14px; border-left: 5px solid var(--primary); text-transform: uppercase;
    }

    .service-item { cursor: pointer; margin-bottom: 12px; position: relative; transition: 0.3s; }
    .service-card { 
        background: var(--glass); border-radius: 22px; padding: 18px; display: flex; 
        align-items: center; border: 1px solid var(--glass-border); gap: 15px; position: relative; transition: 0.4s ease; 
    }
    
    .service-item:hover .service-card { border-color: rgba(0, 212, 255, 0.5); box-shadow: 0 0 25px rgba(0, 212, 255, 0.15); transform: translateY(-3px); }

    .premium .service-card { border: 1px solid #d4af37 !important; background: linear-gradient(135deg, rgba(212, 175, 55, 0.05), rgba(0,0,0,0)); }
    .premium::after { 
        content: 'PREMIUM'; position: absolute; top: 12px; right: 45px; 
        font-size: 0.5rem; font-weight: 900; color: #d4af37; border: 1px solid #d4af37; 
        padding: 1px 5px; border-radius: 4px; z-index: 11;
    }

    .check-icon { 
        position: absolute; top: 12px; right: 12px; background: var(--primary); 
        color: #000; width: 26px; height: 26px; border-radius: 50%; display: none; 
        align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 900; z-index: 20; 
    }
    .selected .check-icon { display: flex !important; animation: popCheck 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

    .price-tag { color: var(--primary); font-weight: 700; font-size: 1.3rem; }
    .premium .price-tag { background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .badge-oferta { 
        position: absolute; top: -1px; left: 20px; background: var(--promo); color: #000; 
        padding: 2px 12px; border-radius: 0 0 10px 10px; font-size: 0.6rem; font-weight: 800; z-index: 11; 
    }

    /* --- OTROS --- */
    .grid-botones { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
    .btn-universal { display: flex; align-items: center; justify-content: center; padding: 12px; border-radius: 50px; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; text-decoration: none; transition: 0.3s; }
    
    .floating-btn { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #25d366, #128c7e); color: white; padding: 20px; border-radius: 25px; width: 92%; z-index: 1000; }
    
    #back-to-top { position: fixed; bottom: 100px; right: 20px; width: 45px; height: 45px; background: var(--primary); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 999; border: none; opacity: 0; visibility: hidden; transition: 0.4s; }
    #back-to-top.show { opacity: 1; visibility: visible; }

    @keyframes popCheck { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    .hidden { display: none !important; }
</style>
</head>

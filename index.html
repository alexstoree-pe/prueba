<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex Store | Catálogo Digital Premium</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00ffcc;
            --bg-dark: #0a0a0a;
            --card-bg: #111;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding-bottom: 100px;
        }

        /* Header y Logo */
        header { text-align: center; padding: 30px 10px; }
        .brand-logo { width: 80px; border-radius: 50%; margin-bottom: 10px; }
        h1 { font-size: 1.8rem; letter-spacing: 3px; margin: 0; }

        /* Barra de Confianza */
        .trust-bar { display: flex; justify-content: center; gap: 15px; font-size: 0.65rem; margin-bottom: 20px; color: #aaa; }
        .trust-item i { color: var(--primary); margin-right: 4px; }

        /* Buscador y Filtros */
        .search-container { padding: 0 20px; max-width: 600px; margin: 0 auto; }
        #search-input { 
            width: 100%; padding: 15px; border-radius: 25px; border: 1px solid #333;
            background: #1a1a1a; color: white; margin-bottom: 20px;
        }

        .filter-container { 
            display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; 
            scrollbar-width: none;
        }
        .btn-nav { 
            white-space: nowrap; padding: 8px 18px; border-radius: 20px; 
            border: 1px solid #333; background: #1a1a1a; color: #888; cursor: pointer;
        }
        .btn-nav.active { background: var(--primary); color: #000; border-color: var(--primary); }

        /* Grid de Productos */
        .container { padding: 20px; max-width: 1000px; margin: 0 auto; }
        .category-title { font-weight: 800; margin: 30px 0 15px; color: var(--primary); }
        .service-item { margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .service-card { 
            background: var(--card-bg); padding: 15px; border-radius: 18px; 
            display: flex; align-items: center; border: 1px solid #222;
        }
        .service-item.selected .service-card { border-color: var(--primary); background: #161616; }
        .service-logo { width: 50px; height: 50px; border-radius: 12px; margin-right: 15px; }
        
        /* Botones y Modales */
        .btn-universal { padding: 12px; border-radius: 12px; text-decoration: none; font-weight: 700; text-align: center; display: block; }
        .modal-overlay, .modal-pass { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content { background: #111; padding: 30px; border-radius: 25px; width: 85%; max-width: 400px; text-align: center; border: 1px solid #333; }
        
        /* Botón Flotante */
        .floating-btn { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 400px; background: var(--primary); color: #000;
            padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,255,204,0.3);
            z-index: 900; transition: 0.5s;
        }
        .hidden { bottom: -100px; opacity: 0; }
    </style>
</head>
<body>

    <header>
        <img src="../img/logo.webp" alt="Logo" class="brand-logo" data-aos="zoom-in">
        <h1 data-aos="fade-down">ALEX STORE</h1>
        <p style="color: #555; font-size: 0.7rem; letter-spacing: 5px; font-weight: 700;">PREMIUM DIGITAL CATALOG</p>
        
        <div class="search-container" data-aos="fade-up">
            <div class="trust-bar">
                <div class="trust-item"><i class="fas fa-headset"></i>Soporte</div>
                <div class="trust-item"><i class="fas fa-shield-alt"></i>Garantía</div>
                <div class="trust-item"><i class="fas fa-bolt"></i>Entrega < 5 min</div>
            </div>
            <input type="text" id="search-input" placeholder="Buscar plataforma..." onkeyup="filtrarProductos()">
            
            <div class="filter-container" id="filterScroll">
                <button class="btn-nav active" onclick="filtrarCategoria('TODOS', this)">TODOS</button>
                <button class="btn-nav" onclick="filtrarCategoria('🎬 STREAMING Y CINE', this)">PERFILES</button>
                <button class="btn-nav" onclick="filtrarCategoria('DISEÑOS Y MAS', this)">DISEÑO</button>
                <button class="btn-nav" onclick="filtrarCategoria('TELEVISIÓN DIGITAL', this)">TV DIGITAL</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="category-title" data-aos="fade-right">🎬 STREAMING Y CINE</div>
        
        <div class="service-item" onclick="toggleCarrito(this)" data-aos="fade-up">
            <div class="service-card">
                <img src="../img/netflix.webp" class="service-logo">
                <div class="service-text" style="flex-grow:1;">
                    <h3 class="nombre-prod" style="margin:0; font-size:1rem;">Netflix Premium</h3>
                    <span class="manual-desc" style="color:#777; font-size:0.8rem;">• Perfil Privado • 4K UHD.</span>
                </div>
                <div class="price-tag precio-prod" style="font-weight:800;">S/ 16</div>
            </div>
        </div>
        
        </div>

    <div id="whatsapp-btn" class="floating-btn hidden">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div onclick="abrirModalRegistro()" style="cursor:pointer;">
                <span id="cart-count" style="background:rgba(0,0,0,0.2); padding:5px 12px; border-radius:10px; font-weight:800;">0</span>
                <span style="margin-left:8px; font-weight:800;">PEDIR AHORA</span>
            </div>
            <span id="cart-total" style="font-size:1.2rem; font-weight:800;">S/ 0</span>
        </div>
    </div>

    <div id="modal-password" class="modal-pass">
        <div class="modal-content">
            <h2 style="color:var(--primary);">ACCESO PRIVADO</h2>
            <input type="password" id="input-pass" placeholder="****" style="width:80%; padding:15px; border-radius:15px; border:none; background:#000; color:#fff; text-align:center;">
            <button onclick="validarPass()" class="btn-universal" style="background:var(--primary); width:100%; margin-top:15px; border:none;">INGRESAR</button>
        </div>
    </div>

    <div id="modal-registro" class="modal-overlay">
        <div class="modal-content">
            <div id="paso-1">
                <h2 style="color:var(--primary);">¿Ya eres cliente?</h2>
                <button class="btn-universal" style="background:#222; color:#fff; width:100%; margin-bottom:10px;" onclick="mostrarFormAntiguo()">SÍ, YA COMPRÉ ANTES</button>
                <button class="btn-universal" style="background:var(--primary); color:#000; width:100%;" onclick="mostrarForm()">SOY NUEVO CLIENTE</button>
                <button onclick="cerrarModalRegistro()" style="background:none; border:none; color:#555; margin-top:15px; cursor:pointer;">Cerrar</button>
            </div>
            <div id="form-datos" style="display:none;">
                <input type="text" id="reg-nom" placeholder="Nombre Completo" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; background:#000; color:#fff; border:1px solid #333;">
                <button class="btn-universal" style="background:var(--primary); width:100%; border:none;" onclick="enviarWhatsApp('nuevo')">FINALIZAR Y ENVIAR</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
        let carrito = [];
        const numWhatsApp = "51918600000";

        // Control de Acceso (Previene pantalla en blanco)
        document.addEventListener("DOMContentLoaded", () => {
            if (sessionStorage.getItem("acceso_concedido") !== "true") {
                document.getElementById('modal-password').style.display = 'flex';
            }
        });

        function validarPass() {
            if (document.getElementById('input-pass').value.toLowerCase() === "cliente") { 
                sessionStorage.setItem("acceso_concedido", "true"); 
                location.reload(); 
            } else { alert("Error"); }
        }

        // Filtrado
        function filtrarProductos() {
            const query = document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('.service-item').forEach(item => {
                const text = item.querySelector('.nombre-prod').innerText.toLowerCase();
                item.style.display = text.includes(query) ? 'block' : 'none';
            });
        }

        function filtrarCategoria(cat, btn) {
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.service-item').forEach(item => {
                item.style.display = (cat === 'TODOS' || item.innerText.includes(cat)) ? 'block' : 'none';
            });
            actualizarTitulos();
        }

        function actualizarTitulos() {
            document.querySelectorAll('.category-title').forEach(t => {
                let sig = t.nextElementSibling;
                let visible = false;
                while(sig && !sig.classList.contains('category-title')) {
                    if(sig.style.display !== 'none') visible = true;
                    sig = sig.nextElementSibling;
                }
                t.style.display = visible ? 'block' : 'none';
            });
        }

        // Carrito y UI
        function toggleCarrito(el) {
            const nombre = el.querySelector('.nombre-prod').innerText;
            const precio = parseFloat(el.querySelector('.precio-prod').innerText.replace('S/', ''));
            const idx = carrito.findIndex(i => i.nombre === nombre);
            
            if(idx > -1) {
                carrito.splice(idx, 1);
                el.classList.remove('selected');
            } else {
                carrito.push({nombre, precio});
                el.classList.add('selected');
            }
            actualizarUI();
        }

        function actualizarUI() {
            const sub = carrito.reduce((s, i) => s + i.precio, 0);
            document.getElementById('cart-count').innerText = carrito.length;
            document.getElementById('cart-total').innerText = `S/ ${sub}`;
            document.getElementById('whatsapp-btn').classList.toggle('hidden', carrito.length === 0);
        }

        function enviarWhatsApp(tipo) {
            let msg = `Hola Alex Store, quiero:\n` + carrito.map(i => `- ${i.nombre}`).join('\n');
            window.open(`https://wa.me/${numWhatsApp}?text=${encodeURIComponent(msg)}`);
        }

        function abrirModalRegistro() { document.getElementById('modal-registro').style.display = 'flex'; }
        function cerrarModalRegistro() { document.getElementById('modal-registro').style.display = 'none'; }
        function mostrarForm() { 
            document.getElementById('paso-1').style.display = 'none'; 
            document.getElementById('form-datos').style.display = 'block'; 
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex Store | Catalog Management</title>

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #00ffcc;
            --primary-dark: #00ccaa;
            --bg-dark: #0a0a0a;
            --card-bg: #111;
            --text-main: #ffffff;
            --text-dim: #888;
            --border-color: #222;
        }

        /* Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Header UI */
        header { 
            padding: 40px 20px; 
            text-align: center;
            background: linear-gradient(to bottom, #111, var(--bg-dark));
        }
        .brand-logo { width: 90px; border-radius: 50%; border: 2px solid var(--primary); padding: 5px; }
        .store-title { font-size: 2rem; letter-spacing: 4px; font-weight: 900; margin: 10px 0; }
        
        /* Search & Filters */
        .controls-wrapper { max-width: 600px; margin: 0 auto; padding: 0 15px; }
        .search-box {
            width: 100%; padding: 16px 25px; border-radius: 30px;
            background: #161616; border: 1px solid var(--border-color);
            color: white; font-size: 1rem; outline: none; transition: 0.3s;
        }
        .search-box:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,255,204,0.1); }

        .filter-nav {
            display: flex; gap: 10px; overflow-x: auto; padding: 20px 0;
            scrollbar-width: none; /* Firefox */
        }
        .filter-nav::-webkit-scrollbar { display: none; } /* Chrome/Safari */
        
        .btn-filter {
            background: #161616; border: 1px solid var(--border-color);
            color: var(--text-dim); padding: 10px 20px; border-radius: 20px;
            cursor: pointer; white-space: nowrap; font-weight: 600; transition: 0.3s;
        }
        .btn-filter.active { background: var(--primary); color: #000; border-color: var(--primary); }

        /* Catalog Grid */
        .catalog-container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .category-header { 
            color: var(--primary); font-size: 1.2rem; font-weight: 800;
            margin: 40px 0 20px; border-left: 4px solid var(--primary); padding-left: 15px;
        }

        .product-card {
            background: var(--card-bg); border-radius: 20px; padding: 15px;
            display: flex; align-items: center; gap: 15px; margin-bottom: 15px;
            border: 1px solid var(--border-color); transition: 0.3s; cursor: pointer;
        }
        .product-card:hover { transform: translateY(-3px); border-color: #333; }
        .product-card.selected { border-color: var(--primary); background: #161616; }

        .prod-img { width: 55px; height: 55px; border-radius: 14px; object-fit: cover; }
        .prod-info { flex-grow: 1; }
        .prod-name { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; }
        .prod-desc { font-size: 0.85rem; color: var(--text-dim); }
        .prod-price { font-weight: 900; color: var(--primary); font-size: 1.1rem; }

        /* Floating Checkout */
        .checkout-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 450px; background: var(--primary);
            padding: 18px 25px; border-radius: 25px; color: #000;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 15px 40px rgba(0,255,204,0.3); z-index: 999;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .checkout-bar.hidden { bottom: -120px; opacity: 0; }

        /* Modals & Overlay */
        .modal-base {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10000;
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .modal-box {
            background: #111; border: 1px solid #333; border-radius: 30px;
            padding: 40px; width: 90%; max-width: 400px; text-align: center;
        }
        .input-dark {
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #333;
            background: #000; color: #fff; text-align: center; margin: 15px 0; outline: none;
        }
        .btn-action {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: var(--primary); color: #000; font-weight: 800; cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <img src="../img/logo.webp" alt="Alex Store" class="brand-logo" data-aos="zoom-in">
        <h1 class="store-title" data-aos="fade-down">ALEX STORE</h1>
        
        <div class="controls-wrapper">
            <input type="text" id="searchBox" class="search-box" placeholder="Buscar plataforma..." onkeyup="app.filterByText()">
            
            <nav class="filter-nav" id="catFilters">
                <button class="btn-filter active" onclick="app.filterByCat('TODOS', this)">TODOS</button>
                <button class="btn-filter" onclick="app.filterByCat('🎬 STREAMING Y CINE', this)">STREAMING</button>
                <button class="btn-filter" onclick="app.filterByCat('DISEÑOS Y MAS', this)">DISEÑO</button>
                <button class="btn-filter" onclick="app.filterByCat('TELEVISIÓN DIGITAL', this)">TV DIGITAL</button>
            </nav>
        </div>
    </header>

    <main class="catalog-container">
        <div class="category-section">
            <div class="category-header" data-aos="fade-right">🎬 STREAMING Y CINE</div>
            
            <div class="product-card" onclick="app.toggleCart(this)" data-aos="fade-up">
                <img src="../img/netflix.webp" class="prod-img">
                <div class="prod-info">
                    <h3 class="prod-name">Netflix Premium</h3>
                    <p class="prod-desc">Perfil Privado • 4K Ultra HD • 30 días</p>
                </div>
                <div class="prod-price">S/ 16</div>
            </div>
            </div>
    </main>

    <div id="checkoutBar" class="checkout-bar hidden">
        <div onclick="app.openOrderModal()" style="cursor:pointer">
            <span id="countBadge" style="background:rgba(0,0,0,0.15); padding:4px 12px; border-radius:10px; font-weight:900;">0</span>
            <span style="margin-left:10px; font-weight:800;">CONFIRMAR PEDIDO</span>
        </div>
        <div id="totalDisplay" style="font-size: 1.3rem; font-weight: 900;">S/ 0</div>
    </div>

    <div id="passwordModal" class="modal-base">
        <div class="modal-box">
            <h2 style="color:var(--primary); margin-bottom:10px;">ACCESO PRIVADO</h2>
            <p style="color:#666; font-size:0.9rem;">Ingresa el código de acceso</p>
            <input type="password" id="passInput" class="input-dark" placeholder="••••">
            <button class="btn-action" onclick="app.checkPass()">INGRESAR</button>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Encapsulamos todo en un objeto 'app' para evitar conflictos (estilo VS Code)
        const app = {
            cart: [],
            config: {
                whatsapp: "51918600000",
                pass: "cliente"
            },

            init() {
                AOS.init({ duration: 800, once: true });
                this.security();
            },

            security() {
                const isAuth = sessionStorage.getItem("store_auth");
                if (!isAuth) {
                    document.getElementById('passwordModal').style.display = 'flex';
                }
            },

            checkPass() {
                const val = document.getElementById('passInput').value.toLowerCase();
                if (val === this.config.pass) {
                    sessionStorage.setItem("store_auth", "true");
                    location.reload();
                } else {
                    alert("Código incorrecto");
                }
            },

            filterByText() {
                const query = document.getElementById('searchBox').value.toLowerCase();
                document.querySelectorAll('.product-card').forEach(card => {
                    const name = card.querySelector('.prod-name').innerText.toLowerCase();
                    card.style.display = name.includes(query) ? 'flex' : 'none';
                });
                this.updateHeaders();
            },

            filterByCat(cat, btn) {
                document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                document.querySelectorAll('.product-card').forEach(card => {
                    if(cat === 'TODOS') {
                        card.style.display = 'flex';
                    } else {
                        const sectionTitle = card.closest('.category-section').querySelector('.category-header').innerText;
                        card.style.display = sectionTitle.includes(cat) ? 'flex' : 'none';
                    }
                });
                this.updateHeaders();
            },

            updateHeaders() {
                document.querySelectorAll('.category-section').forEach(sec => {
                    const hasVisible = Array.from(sec.querySelectorAll('.product-card')).some(c => c.style.display !== 'none');
                    sec.style.display = hasVisible ? 'block' : 'none';
                });
            },

            toggleCart(element) {
                const name = element.querySelector('.prod-name').innerText;
                const price = parseFloat(element.querySelector('.prod-price').innerText.replace('S/', ''));
                const index = this.cart.findIndex(item => item.name === name);

                if (index > -1) {
                    this.cart.splice(index, 1);
                    element.classList.remove('selected');
                } else {
                    this.cart.push({ name, price });
                    element.classList.add('selected');
                }
                this.renderUI();
            },

            renderUI() {
                const total = this.cart.reduce((sum, item) => sum + item.price, 0);
                document.getElementById('countBadge').innerText = this.cart.length;
                document.getElementById('totalDisplay').innerText = `S/ ${total}`;
                
                const bar = document.getElementById('checkoutBar');
                this.cart.length > 0 ? bar.classList.remove('hidden') : bar.classList.add('hidden');
            },

            openOrderModal() {
                // Aquí podrías abrir el modal de registro. Para este ejemplo, enviamos directo:
                let message = `*NUEVO PEDIDO - ALEX STORE*\n\n`;
                this.cart.forEach(item => message += `🔹 ${item.name} (S/ ${item.price})\n`);
                message += `\n*TOTAL: S/ ${this.cart.reduce((s,i) => s+i.price, 0)}*`;
                
                window.open(`https://wa.me/${this.config.whatsapp}?text=${encodeURIComponent(message)}`);
            }
        };

        // Iniciar App
        app.init();
    </script>
</body>
</html>

<style>
    :root {
        --primary: #00d4ff;
        --secondary: #0055ff;
        --dark: #050505;
        --glass: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.08);
        --whatsapp: #25d366;
        --promo: #f4d03f;
        --promo-dark: #d4af37;
        --danger: #ff4444; 
        --gold-gradient: linear-gradient(45deg, #d4af37, #f4d03f, #b38728);
    }

    html { display: none; background-color: var(--dark); scroll-behavior: smooth; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { 
        font-family: 'Poppins', sans-serif; 
        background: radial-gradient(circle at top right, #0a0a0a, #050505);
        color: white; 
        line-height: 1.4; 
        padding-bottom: 100px; 
        position: relative;
        transition: background 0.4s ease;
    }

    body::before {
        content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
        opacity: 0.03; pointer-events: none; z-index: 10000;
    }

    /* --- PROGRESO Y OVERLAY --- */
    #progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 3px; z-index: 3000; background: transparent; }
    #progress-bar { height: 100%; width: 0%; background: var(--primary); box-shadow: 0 0 10px var(--primary); }

    #search-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.85);
        backdrop-filter: blur(8px); opacity: 0; visibility: hidden; z-index: 1500; transition: 0.4s;
    }
    body.searching #search-overlay { opacity: 1; visibility: visible; }
    body.searching header { z-index: 2100; }
    body.searching .service-item { position: relative; z-index: 2200; }

    /* --- HEADER --- */
    header {
        background: rgba(10, 10, 10, 0.7);
        backdrop-filter: blur(25px) saturate(180%);
        padding: 8px 10px 5px; text-align: center;
        border-bottom: 1px solid var(--glass-border);
        position: sticky; top: 0; z-index: 2000;
    }

    .brand-logo { width: 35px; height: 35px; object-fit: contain; border-radius: 10px; margin-bottom: 2px; }
    header h1 { font-size: 1.1rem; font-weight: 800; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }

    .trust-bar { display: flex; justify-content: center; gap: 12px; margin: 4px 0; }
    .trust-item { display: flex; align-items: center; gap: 4px; font-size: 0.35rem; font-weight: 600; color: #888; text-transform: uppercase; }
    .trust-item i { color: var(--primary); font-size: 0.6rem; }

    /* --- FILTROS Y BUSCADOR --- */
    .search-container { max-width: 600px; margin: 5px auto 0; position: relative; }
    #search-input { 
        width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid var(--glass-border); 
        background: rgba(255,255,255,0.05); color: white; outline: none; font-size: 0.8rem; margin-bottom: 10px; z-index: 2200;
    }

    .filter-wrapper { margin: 5px 0; position: relative; display: flex; align-items: center; gap: 5px; padding: 0 10px; }
    .filter-container { display: flex; gap: 10px; overflow-x: auto; padding: 10px 5px; scrollbar-width: none; scroll-behavior: smooth; flex-grow: 1; }
    .filter-container::-webkit-scrollbar { display: none; }
    
    .scroll-indicator { 
        background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: var(--primary); 
        width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 5; 
    }

    .btn-nav { background: var(--glass); border: 1px solid var(--glass-border); color: white; padding: 6px 16px; border-radius: 50px; font-size: 0.65rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.3s; }
    .btn-nav.active { background: var(--primary); color: #000; border-color: var(--primary); }

    .view-controls { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
    .btn-view { background: #111; border: 1px solid #333; color: #666; padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
    .btn-view.active { color: var(--primary); border-color: var(--primary); background: rgba(0, 212, 255, 0.1); }

    /* --- TARJETAS --- */
    .container { padding: 10px 15px; max-width: 600px; margin: auto; transition: all 0.4s ease; }
    .grid-botones { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0 15px; }
    .btn-universal { display: flex; align-items: center; justify-content: center; padding: 10px 8px; border-radius: 50px; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; cursor: pointer; text-decoration: none; border: none; text-align: center; transition: 0.3s; }

    .category-title { 
        margin: 30px 0 15px; padding: 10px 15px; font-size: 0.85rem; font-weight: 700; 
        color: var(--primary); letter-spacing: 2px; background: rgba(255,255,255,0.03); 
        border-radius: 12px; border-left: 4px solid var(--primary); text-transform: uppercase;
    }

    .service-item { cursor: pointer; margin-bottom: 12px; position: relative; transition: 0.3s; }
    .service-item.selected { transform: scale(0.95) !important; }
    .service-card { 
        background: var(--glass); border-radius: 22px; padding: 18px; display: flex; align-items: center; 
        border: 1px solid var(--glass-border); gap: 15px; position: relative; overflow: visible; transition: 0.4s ease; 
    }
    
    /* Vidrio Inteligente */
    .service-item:hover .service-card { border-color: rgba(0, 212, 255, 0.5); box-shadow: 0 0 25px rgba(0, 212, 255, 0.15); transform: translateY(-3px); }

    /* Selección y Premium */
    .service-item.selected .service-card { background: rgba(0, 212, 255, 0.12) !important; border-color: var(--primary) !important; box-shadow: 0 0 25px rgba(0, 212, 255, 0.3); }
    .premium .service-card { border: 1px solid #d4af37 !important; background: linear-gradient(135deg, rgba(212, 175, 55, 0.05), rgba(0,0,0,0)); }
    .premium::after { content: 'PREMIUM'; position: absolute; top: 12px; right: 45px; font-size: 0.5rem; font-weight: 900; color: #d4af37; border: 1px solid #d4af37; padding: 1px 5px; border-radius: 4px; z-index: 11; }
    .service-item.premium.selected .service-card { background: rgba(212, 175, 55, 0.15) !important; border-color: var(--promo) !important; box-shadow: 0 0 30px rgba(212, 175, 55, 0.5); }

    .price-tag { color: var(--primary); font-weight: 700; font-size: 1.25rem; white-space: nowrap; }
    .premium .price-tag { background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .badge-oferta { position: absolute; top: -1px; left: 20px; background: var(--promo); color: #000; padding: 2px 12px; border-radius: 0 0 10px 10px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; z-index: 11; }

    .check-icon { 
        position: absolute; top: 12px; right: 12px; background: var(--primary); color: #000; 
        width: 26px; height: 26px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: 900; z-index: 20; 
    }
    .selected .check-icon { display: flex !important; animation: popCheck 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .service-item.premium.selected .check-icon { background: var(--gold-gradient) !important; }

    /* Agotado y Sin Stock */
    .service-item.agotado { pointer-events: none; }
    .service-item.agotado .service-card { opacity: 0.5; filter: grayscale(0.8); }
    .sin-stock-badge { background: #700000; color: white; padding: 8px 15px; border-radius: 12px; font-size: 0.75rem; font-weight: 900; border: 2px solid #ff0000; text-transform: uppercase; animation: blinkNeon 1.5s infinite; }

    /* --- VISTA CUADRÍCULA --- */
    .container.grid-mode { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 95%; padding: 15px; }
    .grid-mode .category-title { grid-column: 1 / -1; width: 100%; margin-top: 30px; display: flex; }
    .grid-mode .service-card { flex-direction: column; text-align: center; min-height: 290px; justify-content: space-between; padding-top: 35px; }
    .grid-mode .premium::after { display: none !important; }

    /* --- WHATSAPP Y SUBIR --- */
    .floating-btn { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #25d366, #128c7e); color: white; padding: 20px; border-radius: 25px; width: 92%; z-index: 1000; animation: pulseOrder 2s infinite ease-in-out; }
    #back-to-top { position: fixed; bottom: 100px; right: 20px; width: 45px; height: 45px; background: var(--primary); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 999; border: none; opacity: 0; visibility: hidden; transition: 0.4s; box-shadow: 0 0 15px rgba(0, 212, 255, 0.5); }
    #back-to-top.show { opacity: 1; visibility: visible; }

    /* --- MODALES --- */
    .modal-overlay, .modal-pass { position: fixed; inset: 0; display: none; justify-content: center; align-items: center; z-index: 3000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
    .modal-content { background: #0d0d0d; padding: 35px 25px; border-radius: 35px; width: 90%; max-width: 420px; text-align: center; border: 1px solid #222; }
    .modal-content input { width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 18px; background: #000; color: #fff; border: 1px solid #222; text-align: center; outline: none; }
    .btn-modal-main { background: var(--primary) !important; color: #000 !important; font-weight: 800; width: 100%; padding: 18px; border-radius: 50px; border: none; cursor: pointer; }

    @keyframes popCheck { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    @keyframes pulseOrder { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.03); } 100% { transform: translateX(-50%) scale(1); } }
    @keyframes blinkNeon { 0% { box-shadow: 0 0 5px #ff0000; opacity: 1; } 50% { box-shadow: 0 0 25px #ff0000; opacity: 0.8; } 100% { box-shadow: 0 0 5px #ff0000; opacity: 1; } }
    .hidden { display: none !important; }
</style>

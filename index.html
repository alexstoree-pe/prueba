<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribución VIP | Alex Store</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00d4ff; 
            --dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --danger-neon: #ff0000;
            --vip: #d4af37;
            --success-neon: #39ff14;
            --gold-gradient: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }

        html { background-color: var(--dark); scroll-behavior: smooth; }

        @keyframes shine-red { 
            0%, 100% { text-shadow: 0 0 10px var(--danger-neon), 0 0 20px var(--danger-neon); color: var(--danger-neon); border-color: var(--danger-neon); box-shadow: inset 0 0 10px var(--danger-neon), 0 0 10px var(--danger-neon); } 
            50% { text-shadow: 0 0 30px var(--danger-neon), 0 0 50px var(--danger-neon); color: #fff; border-color: #fff; box-shadow: inset 0 0 20px var(--danger-neon), 0 0 25px var(--danger-neon); } 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0a0a0a; color: white; padding-bottom: 200px; overflow-x: hidden; }

        header { 
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); padding: 25px 20px 15px; 
            text-align: center; border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 2000; 
        }
        .brand-logo { width: 65px; height: 65px; object-fit: contain; border-radius: 18px; margin-bottom: 8px; }
        header h1 { font-size: 1.1rem; letter-spacing: 1px; margin-bottom: 10px; }

        .garantia-header { display: flex; justify-content: center; gap: 15px; margin-top: 5px; }
        .garantia-mini-item { text-align: center; min-width: 60px; }
        .garantia-mini-item i { font-size: 0.9rem; color: var(--primary); margin-bottom: 2px; }
        .garantia-mini-item p { font-size: 0.45rem; font-weight: 700; text-transform: uppercase; color: #888; line-height: 1.1; }

        .search-container { position: sticky; top: 165px; z-index: 1900; padding: 10px 15px; background: #0a0a0a; }
        .search-wrapper { position: relative; max-width: 500px; margin: auto; }
        .search-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        #buscador { width: 100%; padding: 12px 15px 12px 45px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; color: white; font-family: 'Poppins'; transition: 0.3s; }

        .grid-botones { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px auto; max-width: 500px; padding: 0 15px; }
        .btn-universal { display: flex; align-items: center; justify-content: center; padding: 14px; border-radius: 15px; text-decoration: none; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; border: none; cursor: pointer; transition: 0.3s; }
        .btn-inicio { background: var(--glass); color: #fff; border: 1px solid var(--glass-border); }
        .btn-promo-distri { background: var(--gold-gradient); color: #000; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }

        .container { padding: 10px 15px; max-width: 600px; margin: auto; }
        .category-title { margin: 35px 0 15px; font-size: 0.9rem; font-weight: 800; color: var(--primary); letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }

        /* SELECCIÓN MEJORADA */
        .service-link { position: relative; text-decoration: none; color: inherit; display: block; margin-bottom: 20px; cursor: pointer; transition: 0.3s; }
        .service-card { background: #0f0f0f; border-radius: 25px; padding: 22px; display: flex; align-items: center; border: 1px solid var(--glass-border); gap: 18px; transition: 0.4s; position: relative; z-index: 10; overflow: hidden; }
        
        .service-link.selected .service-card { 
            border-color: var(--primary); 
            background: rgba(0, 212, 255, 0.15); 
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
            transform: scale(0.98);
        }

        .check-icon { 
            position: absolute; top: 12px; right: 12px; 
            background: var(--primary); color: #000; 
            width: 24px; height: 24px; border-radius: 50%; 
            display: none; align-items: center; justify-content: center; 
            font-size: 0.75rem; z-index: 101; border: 2px solid #000;
            animation: popCheck 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popCheck { from { transform: scale(0); } to { transform: scale(1); } }
        .service-link.selected .check-icon { display: flex; }

        /* CLASES DE ESTADO ORIGINALES */
        .status-badge { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; margin-top: 5px; display: flex; align-items: center; gap: 5px; }
        .disponible .status-badge::before { content: "● DISPONIBLE"; color: var(--success-neon); }
        .pocas .status-badge::before { content: "● POCAS UNIDADES"; color: #ff3333; }
        .renovacion .badge-renovacion { display: inline-block; }
        .badge-renovacion { display: none; color: #f1c40f; font-size: 0.55rem; font-weight: 700; margin-top: 3px; text-transform: uppercase; }

        .service-logo { width: 65px; height: 65px; object-fit: cover; border-radius: 18px; }
        .service-text h3 { font-size: 1.1rem; font-weight: 700; color: #fff; }
        .manual-desc { font-size: 0.75rem; color: #888; }
        .price-tag { color: var(--primary); font-weight: 800; font-size: 1.4rem; }

        /* AGOTADO */
        .service-link.agotado { pointer-events: none; }
        .service-link.agotado .service-card { opacity: 0.3; filter: grayscale(1); }
        .service-link.agotado::after { 
            content: "SIN STOCK"; position: absolute; top: 50%; right: 25px; transform: translateY(-50%);
            font-size: 0.8rem; font-weight: 900; border: 2.5px solid var(--danger-neon); 
            padding: 8px 15px; border-radius: 12px; animation: shine-red 1.5s infinite; z-index: 200; background: #000;
        }

        /* BARRA DE WHATSAPP MEJORADA */
        .floating-btn { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            background: linear-gradient(135deg, #25d366, #128c7e); color: white; 
            padding: 15px 20px; border-radius: 22px; width: 92%; max-width: 480px; 
            z-index: 3000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { bottom: -100px; } to { bottom: 25px; } }

        .btn-clear {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ff4d4d;
            width: 35px; height: 35px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .btn-clear:hover { background: #ff0000; color: #fff; }

        /* NOTIFICACIÓN ESTILO HTML */
        #custom-alert {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #1a1a1a; border: 1px solid var(--primary);
            padding: 15px 25px; border-radius: 15px; z-index: 5000;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #custom-alert.show { top: 20px; }
    </style>
</head>
<body>

<div id="custom-alert">
    <i class="fa-solid fa-circle-exclamation" style="color: var(--primary);"></i>
    <span style="font-weight: 600; font-size: 0.9rem;">Por favor, selecciona una plataforma.</span>
</div>

<header>
    <img src="../img/logo.png" class="brand-logo">
    <h1>DISTRIBUIDORES VIP</h1>
    <div class="garantia-header">
        <div class="garantia-mini-item"><i class="fa-solid fa-headset"></i><p>Soporte<br>24/7</p></div>
        <div class="garantia-mini-item"><i class="fa-solid fa-shield-halved"></i><p>Garantía<br>Total</p></div>
        <div class="garantia-mini-item"><i class="fa-solid fa-bolt"></i><p>Entrega<br>Rápida</p></div>
    </div>
</header>

<div class="search-container">
    <div class="search-wrapper">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="buscador" placeholder="Buscar plataforma..." onkeyup="filtrarPlataformas()">
    </div>
</div>

<div class="grid-botones">
    <a href="../" class="btn-universal btn-inicio"><i class="fa-solid fa-house"></i> INICIO</a>
    <a href="../promos-distribuidores/" class="btn-universal btn-promo-distri"><i class="fa-solid fa-crown"></i> PROMOS</a>
</div>

<div class="container" id="lista-productos">
    <div class="category-title"><i class="fa-solid fa-star"></i> LO MÁS VENDIDO</div>

    <div class="service-link premium disponible renovacion" onclick="toggleSeleccion(this)" data-aos="fade-up">
        <div class="service-card">
            <div class="check-icon"><i class="fa-solid fa-check"></i></div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Netflix-new-icon.png" class="service-logo">
            <div class="service-text">
                <div class="status-badge"></div>
                <h3 class="nombre-prod">Netflix Perfil</h3>
                <span class="manual-desc">4K UHD • Privado</span>
            </div>
            <div style="margin-left: auto; text-align: right;">
                <span class="price-tag precio-prod">S/ 12</span>
                <span class="badge-renovacion">Renovación</span>
            </div>
        </div>
    </div>

    <div class="service-link premium pocas renovacion" onclick="toggleSeleccion(this)" data-aos="fade-up">
        <div class="service-card">
            <div class="check-icon"><i class="fa-solid fa-check"></i></div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Amazon_Prime_Video_Logo.png" class="service-logo">
            <div class="service-text">
                <div class="status-badge"></div>
                <h3 class="nombre-prod">Prime Video</h3>
                <span class="manual-desc">Cuenta completa</span>
            </div>
            <div style="margin-left: auto; text-align: right;">
                <span class="price-tag precio-prod">S/ 7</span>
                <span class="badge-renovacion">Renovación</span>
            </div>
        </div>
    </div>
</div>

<div id="whatsapp-btn" class="floating-btn">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="display:flex; align-items:center; gap:10px;">
            <div class="btn-clear" onclick="limpiarSeleccion(event)"><i class="fa-solid fa-trash-can"></i></div>
            <span id="cart-count" style="background:rgba(0,0,0,0.3); padding:5px 12px; border-radius:12px; font-weight:800;">0</span>
            <div onclick="enviarPedido()" style="cursor:pointer">
                <span style="font-weight:800; text-transform:uppercase; font-size:0.85rem;">Pedir por WhatsApp</span>
            </div>
        </div>
        <span id="cart-total" style="font-weight:800; font-size:1.1rem;">S/ 0.00</span>
    </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ duration: 800, once: true });
    let carrito = [];

    function filtrarPlataformas() {
        const input = document.getElementById('buscador').value.toLowerCase();
        document.querySelectorAll('.service-link').forEach(t => {
            const n = t.querySelector('.nombre-prod').innerText.toLowerCase();
            t.style.display = n.includes(input) ? "block" : "none";
        });
    }

    function toggleSeleccion(elemento) {
        if(elemento.classList.contains('agotado')) return;
        
        const nombre = elemento.querySelector('.nombre-prod').innerText;
        const precio = parseFloat(elemento.querySelector('.precio-prod').innerText.replace('S/ ', ''));
        const index = carrito.findIndex(p => p.nombre === nombre);

        if (index > -1) {
            carrito.splice(index, 1);
            elemento.classList.remove('selected');
        } else {
            carrito.push({ nombre, precio });
            elemento.classList.add('selected');
        }
        actualizarCarritoUI();
    }

    function limpiarSeleccion(event) {
        event.stopPropagation();
        carrito = [];
        document.querySelectorAll('.service-link').forEach(t => t.classList.remove('selected'));
        actualizarCarritoUI();
    }

    function actualizarCarritoUI() {
        const barra = document.getElementById('whatsapp-btn');
        const total = carrito.reduce((sum, p) => sum + p.precio, 0);
        
        document.getElementById('cart-count').innerText = carrito.length;
        document.getElementById('cart-total').innerText = `S/ ${total.toFixed(2)}`;
        barra.style.display = carrito.length > 0 ? 'block' : 'none';
    }

    function mostrarAviso() {
        const alert = document.getElementById('custom-alert');
        alert.classList.add('show');
        setTimeout(() => alert.classList.remove('show'), 3000);
    }

    function enviarPedido() {
        if (carrito.length === 0) {
            mostrarAviso();
            return;
        }
        let mensaje = "¡Hola Alex Store! 👋 Deseo adquirir:\n\n";
        carrito.forEach(p => mensaje += `✅ ${p.nombre} - S/ ${p.precio}\n`);
        const total = carrito.reduce((sum, p) => sum + p.precio, 0);
        mensaje += `\n💰 *TOTAL: S/ ${total.toFixed(2)}*`;
        window.open(`https://wa.me/51918600000?text=${encodeURIComponent(mensaje)}`, '_blank');
    }
</script>
</body>
</html>

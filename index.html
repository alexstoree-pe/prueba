<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribución VIP | Alex Store</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00d4ff;
            --dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --danger-neon: #ff0000;
            --vip: #d4af37;
            --success-neon: #39ff14;
        }

        /* CORRECCIÓN: Quitamos el display:none inicial para que cargue */
        html { background-color: var(--dark); scroll-behavior: smooth; }

        @keyframes shine-red { 
            0%, 100% { text-shadow: 0 0 10px var(--danger-neon), 0 0 20px var(--danger-neon); color: var(--danger-neon); border-color: var(--danger-neon); box-shadow: inset 0 0 10px var(--danger-neon), 0 0 10px var(--danger-neon); } 
            50% { text-shadow: 0 0 30px var(--danger-neon), 0 0 50px var(--danger-neon); color: #fff; border-color: #fff; box-shadow: inset 0 0 20px var(--danger-neon), 0 0 25px var(--danger-neon); } 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0a0a0a; color: white; padding-bottom: 200px; overflow-x: hidden; }

        /* HEADER */
        header { 
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); padding: 40px 20px 20px; 
            text-align: center; border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 2000; 
        }
        .brand-logo { width: 75px; height: 75px; object-fit: contain; border-radius: 20px; margin-bottom: 10px; }
        
        /* BOTONES TOP */
        .grid-botones { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px auto; max-width: 500px; padding: 0 15px; }
        .btn-universal { display: flex; align-items: center; justify-content: center; padding: 14px; border-radius: 15px; text-decoration: none; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; border: none; cursor: pointer; transition: 0.3s; }
        .btn-inicio { background: var(--glass); color: #fff; border: 1px solid var(--glass-border); }
        .btn-promo-distri { background: linear-gradient(45deg, #d4af37, #f1c40f); color: #000; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }

        .container { padding: 10px 15px; max-width: 600px; margin: auto; }
        .category-title { margin: 35px 0 15px; font-size: 0.9rem; font-weight: 800; color: var(--primary); letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }

        /* TARJETAS */
        .service-link { position: relative; text-decoration: none; color: inherit; display: block; margin-bottom: 30px; }
        .service-card { background: #0f0f0f; border-radius: 25px; padding: 22px; display: flex; align-items: center; border: 1px solid var(--glass-border); gap: 18px; transition: 0.4s; position: relative; z-index: 10; }
        
        /* GADGE PREMIUM (BORDE DORADO) */
        .premium .service-card { border: 2px solid var(--vip); box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }

        /* GADGE OFERTA (ESTILO COLGANTE) */
        .badge-oferta { 
            position: absolute; top: -10px; left: 20px; 
            background: #f1c40f; color: #000; 
            padding: 4px 14px; border-radius: 8px 8px 8px 0; 
            font-size: 0.65rem; font-weight: 900; z-index: 100;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        /* TEXTO PREMIUM ARRIBA DEL PRECIO */
        .premium-text { display: none; color: var(--vip); font-size: 0.65rem; font-weight: 900; text-transform: uppercase; margin-right: 15px; margin-bottom: 2px; }
        .premium .premium-text { display: block; }

        /* GADGE DISPONIBLE / POCAS */
        .status-badge { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
        .disponible .status-badge { color: var(--success-neon); }
        .pocas .status-badge { color: #ff3333; }

        .service-logo { width: 65px; height: 65px; object-fit: cover; border-radius: 18px; }
        .service-text h3 { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 2px; }
        .manual-desc { font-size: 0.75rem; color: #888; display: block; }
        
        /* PRECIO EN BLANCO */
        .price-container { display: flex; flex-direction: column; align-items: flex-end; margin-left: auto; }
        .price-tag { color: #fff; font-weight: 800; font-size: 1.4rem; }

        /* GADGE RENOVACIÓN AMARILLO */
        .badge-renovacion { display: none; background: #f1c40f; color: #000; font-size: 0.6rem; font-weight: 900; padding: 2px 8px; border-radius: 5px; margin-top: 5px; text-transform: uppercase; }
        .renovacion .badge-renovacion { display: inline-block; }

        /* SIN STOCK NEÓN */
        .service-link.agotado { pointer-events: none; }
        .service-link.agotado .service-card { opacity: 0.2; }
        .service-link.agotado::after { 
            content: "SIN STOCK"; position: absolute; top: 50%; right: 25px; transform: translateY(-50%);
            font-size: 0.8rem; font-weight: 900; border: 2.5px solid var(--danger-neon); 
            padding: 8px 15px; border-radius: 12px; animation: shine-red 1.5s infinite; 
            z-index: 200; background: #000;
        }

        /* CARRITO */
        .floating-btn { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #25d366, #128c7e); color: white; padding: 18px; border-radius: 22px; width: 92%; max-width: 480px; z-index: 3000; display: none; }
    </style>
</head>
<body>

<header>
    <img src="../img/logo.png" class="brand-logo">
    <h1>DISTRIBUIDORES VIP</h1>
</header>

<div class="grid-botones">
    <a href="../" class="btn-universal btn-inicio"><i class="fa-solid fa-house"></i> INICIO</a>
    <a href="../promos-distribuidores/" class="btn-universal btn-promo-distri"><i class="fa-solid fa-crown"></i> PROMO DISTRIBUIDORES</a>
</div>

<div class="container">
    <div class="category-title"><i class="fa-solid fa-user-circle"></i> PERFILES INDIVIDUALES</div>

    <div class="service-link premium disponible renovacion" data-aos="fade-up">
        <span class="badge-oferta">MÁS SOLICITADO 🔥</span>
        <div class="service-card" onclick="toggleSeleccion(this)">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Netflix-new-icon.png" class="service-logo">
            <div class="service-text">
                <div class="status-badge">DISPONIBLE</div>
                <h3 class="nombre-prod">Netflix Perfil</h3>
                <span class="manual-desc">4K UHD • Perfil Privado</span>
            </div>
            <div class="price-container">
                <span class="premium-text">Premium</span>
                <span class="price-tag precio-prod">S/ 12</span>
                <span class="badge-renovacion">Renovación</span>
            </div>
        </div>
    </div>

    <div class="service-link pocas" data-aos="fade-up">
        <span class="badge-oferta">OFERTA ESPECIAL 🔥</span>
        <div class="service-card" onclick="toggleSeleccion(this)">
            <img src="../img/paramount.png" class="service-logo">
            <div class="service-text">
                <div class="status-badge">POCAS UNIDADES</div>
                <h3 class="nombre-prod">Paramount+</h3>
                <span class="manual-desc">Cuenta completa</span>
            </div>
            <div class="price-container">
                <span class="price-tag precio-prod">S/ 7</span>
            </div>
        </div>
    </div>
</div>

<div id="whatsapp-btn" class="floating-btn">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span id="cart-count" style="background:rgba(0,0,0,0.2); padding:4px 12px; border-radius:10px;">0</span>
        <span style="font-weight:800;">PEDIR AHORA</span>
        <span id="cart-total" style="font-weight:800;">S/ 0</span>
    </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ duration: 800, once: true });
    let carrito = [];

    function toggleSeleccion(card) {
        const item = card.closest('.service-link');
        const nombre = item.querySelector('.nombre-prod').innerText;
        const precio = parseFloat(item.querySelector('.precio-prod').innerText.replace('S/ ', ''));
        const index = carrito.findIndex(i => i.nombre === nombre);
        
        if (index > -1) {
            carrito.splice(index, 1);
            item.classList.remove('selected');
        } else {
            carrito.push({ nombre, precio });
            item.classList.add('selected');
        }
        actualizarUI();
    }

    function actualizarUI() {
        const total = carrito.reduce((sum, item) => sum + item.precio, 0);
        document.getElementById('cart-count').innerText = carrito.length;
        document.getElementById('cart-total').innerText = `S/ ${total.toFixed(2)}`;
        document.getElementById('whatsapp-btn').style.display = carrito.length > 0 ? 'block' : 'none';
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribución VIP | Alex Store</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00d4ff; 
            --dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --danger-neon: #ff0000;
            --vip: #d4af37;
            --success-neon: #39ff14;
            --gold-gradient: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }

        html { background-color: var(--dark); scroll-behavior: smooth; }

        @keyframes shine-red { 
            0%, 100% { text-shadow: 0 0 10px var(--danger-neon), 0 0 20px var(--danger-neon); color: var(--danger-neon); border-color: var(--danger-neon); box-shadow: inset 0 0 10px var(--danger-neon), 0 0 10px var(--danger-neon); } 
            50% { text-shadow: 0 0 30px var(--danger-neon), 0 0 50px var(--danger-neon); color: #fff; border-color: #fff; box-shadow: inset 0 0 20px var(--danger-neon), 0 0 25px var(--danger-neon); } 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0a0a0a; color: white; padding-bottom: 200px; overflow-x: hidden; }

        /* HEADER */
        header { 
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); padding: 25px 20px 10px; 
            text-align: center; border-bottom: 1px solid var(--glass-border);
        }
        .brand-logo { width: 55px; height: 55px; object-fit: contain; border-radius: 15px; margin-bottom: 5px; }
        header h1 { font-size: 1.2rem; letter-spacing: 2px; font-weight: 800; color: #fff; }

        /* SECCIÓN GARANTÍA ESTILO FOTO */
        .garantia-container {
            max-width: 500px; margin: 15px auto; padding: 0 15px;
        }
        .garantia-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            padding: 15px 10px;
        }
        .garantia-item { 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 6px;
        }
        .garantia-item i { font-size: 1rem; color: var(--primary); }
        .garantia-item p { 
            font-size: 0.5rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            color: #efefef; 
            letter-spacing: 0.5px;
        }

        /* BUSCADOR */
        .search-container { padding: 10px 15px; max-width: 530px; margin: 0 auto; }
        .search-wrapper { position: relative; }
        .search-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #444; font-size: 0.9rem; }
        #buscador { 
            width: 100%; padding: 14px 15px 14px 45px; 
            background: #111; border: 1px solid #222; 
            border-radius: 14px; color: #888; font-size: 0.85rem;
            transition: 0.3s;
        }
        #buscador:focus { border-color: var(--primary); outline: none; color: #fff; }

        /* BOTONES DE NAVEGACIÓN */
        .grid-botones { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px auto; max-width: 500px; padding: 0 15px; }
        .btn-universal { display: flex; align-items: center; justify-content: center; padding: 12px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; transition: 0.3s; gap: 8px; }
        .btn-inicio { background: #111; color: #fff; border: 1px solid #222; }
        .btn-promo-distri { background: var(--gold-gradient); color: #000; }

        /* TARJETAS */
        .container { padding: 10px 15px; max-width: 600px; margin: auto; }
        .category-title { margin: 25px 0 15px; font-size: 0.85rem; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 8px; text-transform: uppercase; }

        .service-link { position: relative; text-decoration: none; color: inherit; display: block; margin-bottom: 20px; }
        .service-card { background: #0a0a0a; border-radius: 20px; padding: 18px; display: flex; align-items: center; border: 1px solid #1a1a1a; gap: 15px; position: relative; transition: 0.3s; }
        
        .service-link.selected .service-card { border-color: var(--primary); background: rgba(0, 212, 255, 0.05); }

        .badge-oferta { 
            position: absolute; top: 0; left: 0; 
            background: #f1c40f; color: #000; 
            padding: 2px 12px; border-radius: 0 0 10px 0;
            font-size: 0.55rem; font-weight: 900; z-index: 10;
        }

        .premium-text-badge {
            border: 1px solid var(--vip); color: var(--vip);
            padding: 2px 8px; border-radius: 6px; font-size: 0.55rem;
            font-weight: 800; text-transform: uppercase;
            position: absolute; right: 15px; top: 15px;
        }

        .service-logo { width: 50px; height: 50px; object-fit: cover; border-radius: 12px; }
        .service-text h3 { font-size: 1rem; font-weight: 700; color: #fff; }
        .manual-desc { font-size: 0.7rem; color: #555; font-weight: 500; }
        
        .status-txt { font-size: 0.55rem; font-weight: 800; color: var(--success-neon); margin-bottom: 2px; }

        .price-container { margin-left: auto; text-align: right; }
        .price-tag { color: #fff; font-weight: 800; font-size: 1.3rem; }
        .renovacion-tag { display: block; color: var(--vip); font-size: 0.5rem; font-weight: 700; text-transform: uppercase; margin-top: 4px; }

        /* AGOTADO */
        .service-link.agotado { pointer-events: none; }
        .service-link.agotado .service-card { opacity: 0.2; filter: grayscale(1); }
        .service-link.agotado::after { 
            content: "SIN STOCK"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 0.7rem; font-weight: 900; border: 1px solid var(--danger-neon); 
            padding: 5px 15px; border-radius: 8px; color: var(--danger-neon); background: #000;
        }

        .floating-btn { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: #fff; color: #000; padding: 15px 25px; border-radius: 15px; 
            width: 90%; max-width: 400px; z-index: 3000; display: none; font-weight: 800;
        }
    </style>
</head>
<body>

<header>
    <img src="../img/logo.png" class="brand-logo">
    <h1>DISTRIBUIDORES VIP</h1>
</header>

<div class="garantia-container">
    <div class="garantia-box">
        <div class="garantia-item">
            <i class="fa-solid fa-headset"></i>
            <p>Soporte<br>Garantizado</p>
        </div>
        <div class="garantia-item">
            <i class="fa-solid fa-shield-halved"></i>
            <p>Garantía y<br>Compromiso</p>
        </div>
        <div class="garantia-item">
            <i class="fa-solid fa-bolt"></i>
            <p>Entrega en<br>5 Minutos</p>
        </div>
    </div>
</div>

<div class="search-container">
    <div class="search-wrapper">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="buscador" placeholder="Buscar plataforma (Netflix, Disney...)" onkeyup="filtrarPlataformas()">
    </div>
</div>

<div class="grid-botones">
    <a href="../" class="btn-universal btn-inicio"><i class="fa-solid fa-house"></i> INICIO</a>
    <a href="../promos-distribuidores/" class="btn-universal btn-promo-distri"><i class="fa-solid fa-crown"></i> PROMOS</a>
</div>

<div class="container" id="lista-productos">
    <div class="category-title"><i class="fa-solid fa-star"></i> LO MÁS VENDIDO</div>

    <div class="service-link" onclick="toggleSeleccion(this)">
        <div class="service-card">
            <span class="badge-oferta">OFERTA 🔥</span>
            <span class="premium-text-badge">Premium</span>
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Netflix-new-icon.png" class="service-logo">
            <div class="service-text">
                <p class="status-txt">DISPONIBLE</p>
                <h3 class="nombre-prod">Netflix Perfil</h3>
                <span class="manual-desc">4K UHD • Privado</span>
            </div>
            <div class="price-container">
                <span class="price-tag precio-prod">S/ 12</span>
                <span class="renovacion-tag">Disponible para Renovación</span>
            </div>
        </div>
    </div>

    <div class="service-link agotado">
        <div class="service-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Amazon_Prime_Video_Logo.png" class="service-logo">
            <div class="service-text">
                <h3 class="nombre-prod">Prime Video</h3>
                <span class="manual-desc">Cuenta completa</span>
            </div>
            <div class="price-container">
                <span class="price-tag precio-prod">S/ 7</span>
            </div>
        </div>
    </div>
</div>

<div id="whatsapp-btn" class="floating-btn" onclick="enviarPedido()">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span>SOLICITAR PEDIDO (<span id="cart-count">0</span>)</span>
        <span id="cart-total">S/ 0.00</span>
    </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ duration: 800, once: true });
    let carrito = [];

    function filtrarPlataformas() {
        const input = document.getElementById('buscador').value.toLowerCase();
        const tarjetas = document.querySelectorAll('.service-link');
        tarjetas.forEach(t => {
            const nombre = t.querySelector('.nombre-prod').innerText.toLowerCase();
            t.style.display = nombre.includes(input) ? "block" : "none";
        });
    }

    function toggleSeleccion(elemento) {
        if(elemento.classList.contains('agotado')) return;
        const nombre = elemento.querySelector('.nombre-prod').innerText;
        const precio = parseFloat(elemento.querySelector('.precio-prod').innerText.replace('S/ ', ''));
        const index = carrito.findIndex(p => p.nombre === nombre);

        if (index > -1) {
            carrito.splice(index, 1);
            elemento.classList.remove('selected');
        } else {
            carrito.push({ nombre, precio });
            elemento.classList.add('selected');
        }
        actualizarUI();
    }

    function actualizarUI() {
        const total = carrito.reduce((s, p) => s + p.precio, 0);
        document.getElementById('cart-count').innerText = carrito.length;
        document.getElementById('cart-total').innerText = `S/ ${total.toFixed(2)}`;
        document.getElementById('whatsapp-btn').style.display = carrito.length > 0 ? 'block' : 'none';
    }

    function enviarPedido() {
        let mensaje = "¡Hola Alex Store! 👋 Deseo adquirir:\n\n";
        carrito.forEach(p => mensaje += `✅ ${p.nombre} - S/ ${p.precio}\n`);
        const total = carrito.reduce((s, p) => s + p.precio, 0);
        mensaje += `\n💰 *TOTAL: S/ ${total.toFixed(2)}*`;
        window.open(`https://wa.me/51918600000?text=${encodeURIComponent(mensaje)}`, '_blank');
    }
</script>
</body>
</html>
